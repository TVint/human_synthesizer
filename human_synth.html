<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Human Synth - Pro Edition (Larsen Control)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  
  <style>
    body { margin: 0; padding: 0; background-color: #000; color: #0f0; font-family: monospace; overflow: hidden; }
    
    /* UI PRINCIPALE */
    #ui-container {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9); border: 2px solid #0ff; padding: 40px; text-align: center;
      z-index: 200; box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
    }
    h1 { margin-top: 0; font-size: 1.8rem; letter-spacing: 3px; color: #0ff; }
    .btn {
      display: inline-block; padding: 15px 30px; margin: 10px; font-size: 1.2rem;
      background: transparent; color: #0ff; border: 1px solid #0ff; cursor: pointer; 
      text-transform: uppercase; font-weight: bold; transition: 0.2s;
    }
    .btn:hover { background: #0ff; color: #000; }

    /* HUD E DATI LIVE */
    #hud {
      position: absolute; top: 20px; left: 20px; z-index: 100; display: none;
      background: rgba(0, 0, 0, 0.7); padding: 15px; border-left: 3px solid #0ff; font-size: 0.9rem;
    }
    .hud-value { color: #fff; font-weight: bold; }
    
    /* PANIC BUTTON */
    #panic-btn {
      position: absolute; bottom: 20px; left: 20px; z-index: 300; display: none;
      background: transparent; color: #ff0055; border: 2px solid #ff0055;
      padding: 10px 20px; font-size: 1rem; cursor: pointer; font-weight: bold;
    }
    #panic-btn.muted { background: #ff0055; color: #fff; }

    /* DEV PANEL (CONTROLLO LARSEN E PARAMETRI) */
    #dev-panel {
      position: absolute; top: 20px; right: 20px; width: 300px; z-index: 250; display: none;
      background: rgba(10, 10, 10, 0.95); border: 1px solid #333; padding: 20px;
      backdrop-filter: blur(5px); color: #aaa; font-size: 0.85rem;
    }
    #dev-panel h3 { color: #fff; margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 1rem; }
    .control-group { margin-bottom: 15px; }
    label { display: flex; justify-content: space-between; margin-bottom: 5px; }
    input[type=range] { width: 100%; cursor: pointer; accent-color: #0ff; }
    .dev-val { color: #0ff; }

  </style>
</head>
<body>

  <div id="ui-container">
    <h1>HUMAN SYNTH // PRO</h1>
    <p style="color:#aaa; max-width: 400px; margin: 0 auto 20px;">
      Inizializzazione catena audio live. Prepara i controlli del Dev Panel per mitigare il feedback acustico.
    </p>
    <button class="btn" id="start-btn">AVVIA MOTORE AUDIO</button>
  </div>

  <div id="hud">
    <div>LIVELLO MIC: <span id="val-db" class="hud-value">-∞ dB</span></div>
    <hr style="border-color:#333; margin: 10px 0;">
    <div>PITCH SHIFT: <span id="val-pitch" class="hud-value">0 semi</span></div>
    <div>REVERB WET: <span id="val-reverb" class="hud-value">0%</span></div>
  </div>

  <div id="dev-panel">
    <h3>DEV PANEL // CALIBRAZIONE</h3>
    
    <div class="control-group">
      <label><span>Input Gain (Vol)</span> <span id="lbl-gain" class="dev-val">0 dB</span></label>
      <input type="range" id="ctrl-gain" min="-40" max="20" step="1" value="0">
    </div>

    <div class="control-group">
      <label><span>Noise Gate (Taglio)</span> <span id="lbl-gate" class="dev-val">-40 dB</span></label>
      <input type="range" id="ctrl-gate" min="-80" max="-10" step="1" value="-40">
      <small style="color:#666">Sotto questa soglia il microfono è muto.</small>
    </div>

    <div class="control-group">
      <label><span>Max Reverb (Limite)</span> <span id="lbl-maxrev" class="dev-val">80%</span></label>
      <input type="range" id="ctrl-maxrev" min="10" max="100" step="1" value="80">
      <small style="color:#666">Troppo riverbero innesca il Larsen prima.</small>
    </div>

    <div class="control-group">
      <label><span>Sensibilità Bocca</span> <span id="lbl-mouth" class="dev-val">1.5x</span></label>
      <input type="range" id="ctrl-mouth" min="0.5" max="3" step="0.1" value="1.5">
    </div>
  </div>

  <button id="panic-btn">🔇 KILL SWITCH</button>

  <script>
    let video;
    let facemesh;
    let predictions = [];
    
    // AUDIO NODES
    let mic, inGain, gate, pitchShift, reverb, limiter, meter;
    
    // VARIABILI DI STATO
    let currentPitch = 0;
    let currentReverb = 0;
    let isMuted = false;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      document.getElementById('start-btn').addEventListener('click', startSystem);
      document.getElementById('panic-btn').addEventListener('click', toggleMute);
      
      // Setup Event Listeners per il Dev Panel
      setupDevControls();
    }

    async function startSystem() {
      await Tone.start(); 

      // 1. CREAZIONE CATENA AUDIO PRO
      mic = new Tone.UserMedia();
      
      // Gate: Chiude l'audio se è sotto una certa soglia (ferma i sussurri/ronzii)
      gate = new Tone.Gate({ threshold: -40, smoothing: 0.2 });
      
      // Gain: Alza o abbassa il volume generale in ingresso
      inGain = new Tone.Volume(0);
      
      // Effetti controllati dal viso
      pitchShift = new Tone.PitchShift({ pitch: 0, windowSize: 0.05 });
      reverb = new Tone.Freeverb({ roomSize: 0.9, dampening: 1000 });
      reverb.wet.value = 0;
      
      // Limiter: Il salvavita. Evita che il segnale superi lo zero e distrugga le casse
      limiter = new Tone.Limiter(-2); 
      
      // Analizzatore visivo (collegato al microfono puro)
      meter = new Tone.Meter();

      // IL ROUTING: Mic -> Gate -> Gain -> Pitch -> Reverb -> Limiter -> Casse
      mic.chain(gate, inGain, pitchShift, reverb, limiter, Tone.Destination);
      mic.connect(meter);

      try {
        await mic.open();
      } catch (e) {
        alert("Errore Mic. Dai i permessi al browser."); return;
      }

      // 2. SETUP UI E WEBCAM
      document.getElementById('ui-container').style.display = 'none';
      document.getElementById('hud').style.display = 'block';
      document.getElementById('dev-panel').style.display = 'block';
      document.getElementById('panic-btn').style.display = 'block';

      video = createCapture(VIDEO);
      video.size(640, 480);
      video.hide();

      facemesh = ml5.facemesh(video, () => console.log("FaceMesh Pronto!"));
      facemesh.on("predict", results => { predictions = results; });
    }

    // GESTIONE DEL PANNELLO SVILUPPATORE
    function setupDevControls() {
      const getVal = id => parseFloat(document.getElementById(id).value);
      
      document.getElementById('ctrl-gain').addEventListener('input', (e) => {
        let val = e.target.value;
        document.getElementById('lbl-gain').innerText = `${val} dB`;
        if (inGain) inGain.volume.rampTo(val, 0.1);
      });

      document.getElementById('ctrl-gate').addEventListener('input', (e) => {
        let val = e.target.value;
        document.getElementById('lbl-gate').innerText = `${val} dB`;
        if (gate) gate.threshold = val;
      });

      document.getElementById('ctrl-maxrev').addEventListener('input', (e) => {
        document.getElementById('lbl-maxrev').innerText = `${e.target.value}%`;
      });

      document.getElementById('ctrl-mouth').addEventListener('input', (e) => {
        document.getElementById('lbl-mouth').innerText = `${e.target.value}x`;
      });
    }

    function toggleMute() {
      isMuted = !isMuted;
      Tone.Destination.mute = isMuted;
      const btn = document.getElementById('panic-btn');
      if (isMuted) {
        btn.innerText = "🔊 UNMUTE";
        btn.classList.add('muted');
      } else {
        btn.innerText = "🔇 KILL SWITCH";
        btn.classList.remove('muted');
      }
    }

    function draw() {
      background(0, 0, 0, 60); // Effetto trail visivo

      if (!video || !mic || mic.state !== "started") return;

      // Dati visivi
      let db = meter.getValue();
      let visualLevel = map(db, -50, -10, 0, 1, true); 
      document.getElementById('val-db').innerText = db.toFixed(1) + " dB";

      push();
      translate(width, 0); scale(-1, 1); // Specchia
      
      // Glitch sullo sfondo (intensità collegata al volume in ingresso)
      let shakeIntensity = visualLevel * 40;
      translate(width/2 - video.width/2 + random(-shakeIntensity, shakeIntensity), 
                height/2 - video.height/2 + random(-shakeIntensity, shakeIntensity));
      
      tint(255, 60 + (visualLevel * 150));
      image(video, 0, 0);

      if (predictions.length > 0) {
        processBiometrics();
        drawTechMask(visualLevel);
      }
      pop();
    }

    function drawTechMask(visualLevel) {
      const keypoints = predictions[0].scaledMesh;
      
      // Cromaticità reattiva al riverbero e al pitch
      let r = map(currentReverb, 0, 1, 0, 255);
      let g = map(Math.abs(currentPitch), 0, 12, 255, 0);
      let b = 255; 
      
      stroke(r, g, b, 200);
      strokeWeight(1.5 + (visualLevel * 3));
      noFill();

      beginShape(POINTS);
      for (let j = 0; j < keypoints.length; j++) {
        let [x, y] = keypoints[j];
        point(x, y);
      }
      endShape();
    }

    function processBiometrics() {
      const keypoints = predictions[0].scaledMesh;
      
      // Lettura variabili dal Dev Panel
      let maxRevLimit = parseFloat(document.getElementById('ctrl-maxrev').value) / 100;
      let mouthSens = parseFloat(document.getElementById('ctrl-mouth').value);

      // --- 1. RIVERBERO (Bocca) ---
      const topLip = keypoints[13];
      const bottomLip = keypoints[14];
      let mouthDistance = dist(topLip[0], topLip[1], bottomLip[0], bottomLip[1]);
      
      // Calcolo base dell'apertura
      let rawReverb = map(mouthDistance * mouthSens, 10, 50, 0, 1, true);
      // Applica il limite massimo imposto dal Dev Panel per evitare Larsen estremi
      currentReverb = Math.min(rawReverb, maxRevLimit);
      
      reverb.wet.value = lerp(reverb.wet.value, currentReverb, 0.15);

      // --- 2. PITCH SHIFT (Testa L/R) ---
      const nose = keypoints[1];
      let noseCenterOffset = nose[0] - (video.width / 2);
      
      let targetPitch = map(noseCenterOffset, -150, 150, -12, 12, true);
      targetPitch = targetPitch * -1; // Inverti asse
      
      currentPitch = lerp(currentPitch, targetPitch, 0.1);
      pitchShift.pitch = currentPitch;

      // AGGIORNA HUD
      document.getElementById('val-pitch').innerText = currentPitch.toFixed(1);
      document.getElementById('val-reverb').innerText = (currentReverb * 100).toFixed(0) + "%";
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
