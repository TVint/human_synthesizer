<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>VJ Portal - Face & Music</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  
  <style>
    body { margin: 0; padding: 0; background-color: #000; overflow: hidden; font-family: monospace; color: #fff; }
    
    #start-btn { 
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
      padding: 20px 40px; font-size: 1.5rem; background: transparent; color: #fff; 
      border: 2px solid #fff; cursor: pointer; transition: 0.3s; z-index: 200;
      text-transform: uppercase; letter-spacing: 2px;
    }
    #start-btn:hover { background: #fff; color: #000; }

    #hud {
      position: absolute; top: 20px; left: 20px; z-index: 100;
      background: rgba(0,0,0,0.5); padding: 15px; border: 1px solid #555;
    }
    .bar-container { width: 200px; height: 10px; background: #333; margin-top: 5px; }
    #audio-bar { height: 100%; width: 0%; background: #0f0; transition: width 0.1s; }
  </style>
</head>
<body>

  <button id="start-btn">Accendi il Portale<br><span style="font-size: 0.8rem; opacity:0.7">Accendi la musica e clicca</span></button>

  <div id="hud" style="display: none;">
    <div>LIVELLO MUSICA STANZA:</div>
    <div class="bar-container"><div id="audio-bar"></div></div>
    <div style="margin-top: 15px; font-size: 0.8rem; color:#aaa;">
      >> Metti play alla musica<br>>> Apri la bocca per cambiare colore
    </div>
  </div>

  <script>
    let video;
    let facemesh;
    let predictions = [];
    
    // Audio Tools
    let mic;
    let meter;
    let musicLevel = 0; // Da 0.0 a 1.0

    // Colori Dinamici
    let portalColor = [0, 255, 0]; // Verde di base

    function setup() {
      createCanvas(windowWidth, windowHeight);
      select('#start-btn').mousePressed(initSystem);
    }

    async function initSystem() {
      // 1. Setup Microfono e Analizzatore (Senza inviare l'audio alle casse)
      await Tone.start();
      mic = new Tone.UserMedia();
      meter = new Tone.Meter(); // Analizza il volume in Decibel
      
      mic.connect(meter); // Connettiamo il mic al meter, NON all'uscita master
      mic.open().then(() => {
        console.log("Microfono in ascolto!");
      }).catch(e => {
        alert("Errore microfono. Assicurati di aver dato i permessi.");
      });

      select('#start-btn').hide();
      select('#hud').style('display', 'block');

      // 2. Setup Webcam e AI
      video = createCapture(VIDEO);
      video.size(640, 480);
      video.hide();

      facemesh = ml5.facemesh(video, () => console.log("FaceMesh Pronto!"));
      facemesh.on("predict", results => { predictions = results; });
    }

    function draw() {
      // Calcola il livello della musica in tempo reale
      if (meter) {
        let db = meter.getValue(); // Ritorna un valore tra -100 (silenzio) e 0 (volume max)
        // Mappiamo i Decibel in un valore comodo tra 0 e 1
        musicLevel = map(db, -60, -10, 0, 1, true); 
        select('#audio-bar').style('width', `${musicLevel * 100}%`);
      }

      // Sfondo che "sbiadisce" invece di pulirsi subito, crea l'effetto scia
      background(0, 0, 0, 50); 

      if (!video) return;

      push();
      translate(width, 0);
      scale(-1, 1); // Effetto specchio corretto
      
      // Calcola il glitch basato sulla musica
      // Se la musica pompa forte, l'immagine trema e si ingrandisce
      let shakeX = (random(-1, 1) * musicLevel * 30);
      let shakeY = (random(-1, 1) * musicLevel * 30);
      let zoom = 1 + (musicLevel * 0.2);

      translate(width/2 + shakeX, height/2 + shakeY);
      scale(zoom);
      
      // Disegna il video con opacità che reagisce al beat
      tint(255, 100 + (musicLevel * 155)); 
      image(video, -video.width/2, -video.height/2);

      if (predictions.length > 0) {
        processBiometrics();
        drawTechMask();
      }
      pop();
    }

    function drawTechMask() {
      const keypoints = predictions[0].scaledMesh;
      
      // La maschera diventa più spessa e luminosa quando c'è un basso forte
      let dynamicWeight = 1 + (musicLevel * 4);
      stroke(portalColor[0], portalColor[1], portalColor[2], 200);
      strokeWeight(dynamicWeight);
      
      // Niente riempimento, solo linee
      noFill();

      // Disegna le linee che collegano i punti del viso (effetto ragnatela glitch)
      beginShape(POINTS);
      for (let j = 0; j < keypoints.length; j++) {
        let [x, y] = keypoints[j];
        // Riassegna le coordinate al centro dello schermo
        point(x - video.width/2, y - video.height/2);
      }
      endShape();
    }

    function processBiometrics() {
      const keypoints = predictions[0].scaledMesh;
      const topLip = keypoints[13];
      const bottomLip = keypoints[14];

      let mouthDistance = dist(topLip[0], topLip[1], bottomLip[0], bottomLip[1]);
      
      // Se apri la bocca, cambi i colori RGB del portale
      if (mouthDistance > 20) { // Soglia apertura
        portalColor = [
          random(100, 255), // Red
          random(0, 100),   // Green
          random(200, 255)  // Blue (crea toni magenta/viola/neon)
        ];
      } else {
        // Torna lentamente al verde scuro quando chiudi la bocca
        portalColor[0] = lerp(portalColor[0], 0, 0.1);
        portalColor[1] = lerp(portalColor[1], 255, 0.1);
        portalColor[2] = lerp(portalColor[2], 0, 0.1);
      }
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
