<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Human Synth - Bulletproof VJ OS</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  
  <style>
    body { margin: 0; padding: 0; background-color: #050505; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; }
    #ui-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.9); border: 2px solid #0ff; padding: 40px; text-align: center; z-index: 200; box-shadow: 0 0 30px rgba(0, 255, 255, 0.2); }
    h1 { margin-top: 0; font-size: 1.8rem; letter-spacing: 3px; color: #0ff; }
    .btn { display: inline-block; padding: 15px 30px; margin: 10px; font-size: 1.1rem; background: transparent; border: 1px solid #0ff; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: 0.2s; }
    .btn-pro { color: #00ffff; border-color: #00ffff; }
    .btn-pro:hover { background: #00ffff; color: #000; }
    .btn-safe { color: #ffcc00; border-color: #ffcc00; margin-top: 20px;}
    .btn-safe:hover { background: #ffcc00; color: #000; }
    #hud { position: absolute; top: 20px; left: 20px; z-index: 100; display: none; background: rgba(0, 0, 0, 0.8); padding: 15px; border-left: 4px solid #0ff; font-size: 0.95rem; }
    .hud-value { color: #fff; font-weight: bold; }
    #panic-btn { position: absolute; bottom: 20px; left: 20px; z-index: 300; display: none; background: transparent; color: #ff0055; border: 2px solid #ff0055; padding: 12px 24px; font-size: 1rem; cursor: pointer; font-weight: bold; text-transform: uppercase; }
    #dev-panel { position: absolute; top: 20px; right: 20px; width: 320px; z-index: 250; display: none; background: rgba(10, 10, 10, 0.95); border: 1px solid #333; padding: 20px; color: #ccc; font-size: 0.85rem; }
    #dev-panel h3 { color: #fff; margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 1rem; text-transform: uppercase;}
    .control-group { margin-bottom: 18px; }
    label { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold; }
    input[type=range] { width: 100%; cursor: pointer; accent-color: #0ff; }
    .dev-val { color: #0ff; }
  </style>
</head>
<body>

  <div id="ui-container">
    <h1>VJ OS // INIZIALIZZAZIONE</h1>
    <div style="color:#aaa; max-width: 500px; margin: 0 auto 20px; text-align: left; font-size: 0.9rem;">
      <p>Scegli la modalità di input audio:</p>
    </div>
    
    <button class="btn btn-pro" onclick="window.bootSystem('TAB')">🌐 CATTURA SCHEDA (PRO)</button><br>
    <button class="btn btn-safe" onclick="window.bootSystem('MIC')">🎤 USA MICROFONO (SAFE)</button>
  </div>

  <div id="hud">
    <div>AUDIO IN: <span id="val-db" class="hud-value">-∞ dB</span></div>
    <hr style="border-color:#333; margin: 10px 0;">
    <div>PITCH (X): <span id="val-pitch" class="hud-value">0 semi</span></div>
    <div>DELAY (Bocca): <span id="val-delay" class="hud-value">0%</span></div>
    <div>FILTER (Y): <span id="val-filter" class="hud-value" style="color: #ffcc00;">BYPASS</span></div>
  </div>

  <div id="dev-panel">
    <h3>Dev Panel // Matrix</h3>
    <div class="control-group"><label><span>Input Gain</span> <span id="lbl-gain" class="dev-val">0 dB</span></label><input type="range" id="ctrl-gain" min="-40" max="20" step="1" value="0" oninput="updateDevVal('lbl-gain', this.value, ' dB'); if(inGain) inGain.volume.rampTo(this.value, 0.1);"></div>
    <div class="control-group"><label><span>Max Delay Wet</span> <span id="lbl-maxdelay" class="dev-val">80%</span></label><input type="range" id="ctrl-maxdelay" min="10" max="100" step="1" value="80" oninput="updateDevVal('lbl-maxdelay', this.value, '%');"></div>
    <div class="control-group"><label><span>Asse Y Sensibilità</span> <span id="lbl-ysens" class="dev-val">1.0x</span></label><input type="range" id="ctrl-ysens" min="0.5" max="3" step="0.1" value="1.0" oninput="updateDevVal('lbl-ysens', this.value, 'x');"></div>
  </div>

  <button id="panic-btn" onclick="window.toggleMute()">🔇 Mute Master</button>

  <script>
    // Variabili Globali
    let video, facemesh, predictions = [];
    let inGain, pitchShift, feedbackDelay, djLowpass, djHighpass, limiter, meter;
    let currentPitch = 0, currentDelayWet = 0, currentLpfFreq = 20000, currentHpfFreq = 0;
    let isMuted = false;
    let sysState = "IDLE"; 
    let errorMessage = "";

    function setup() {
      let cvn = createCanvas(windowWidth, windowHeight);
      cvn.position(0, 0);
      cvn.style('z-index', '-1'); 
    }

    // FIX: Assicuriamo che bootSystem sia visibile a tutto il browser
    window.bootSystem = async function(mode) {
      console.log("Avvio richiesto in modalità:", mode);
      
      if (typeof Tone === 'undefined' || typeof ml5 === 'undefined') {
        alert("ERRORE CRITICO: Le librerie Tone.js o ml5.js non sono caricate. Controlla la tua connessione internet o disattiva l'AdBlocker.");
        return;
      }

      document.getElementById('ui-container').style.display = 'none';
      let audioStream;
      sysState = "REQ_AUDIO";

      try {
        if (mode === 'TAB') {
          audioStream = await navigator.mediaDevices.getDisplayMedia({
            video: true,
            audio: { suppressLocalAudioPlayback: true, echoCancellation: false, noiseSuppression: false }
          });
        } else {
          audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        }
      } catch (err) {
        sysState = "ERROR";
        errorMessage = err.message || "Permesso Audio Negato.";
        return; 
      }

      await Tone.start();

      try {
        const audioContext = Tone.getContext().rawContext;
        const mediaStreamSource = audioContext.createMediaStreamSource(audioStream);

        inGain = new Tone.Volume(0);
        pitchShift = new Tone.PitchShift({ pitch: 0, windowSize: 0.03 });
        feedbackDelay = new Tone.FeedbackDelay("8n", 0.6);
        feedbackDelay.wet.value = 0; 
        djLowpass = new Tone.Filter(20000, "lowpass");
        djHighpass = new Tone.Filter(0, "highpass");
        limiter = new Tone.Limiter(-2); 
        meter = new Tone.Meter();

        Tone.connect(mediaStreamSource, inGain); 
        inGain.chain(pitchShift, feedbackDelay, djLowpass, djHighpass, limiter, Tone.Destination);
        inGain.connect(meter);
      } catch (err) {
        sysState = "ERROR"; errorMessage = "Errore nel motore audio Tone.js"; return;
      }

      sysState = "REQ_WEBCAM";
      video = createCapture(VIDEO, () => {
        sysState = "LOAD_AI";
        facemesh = ml5.facemesh(video, () => {
          sysState = "RUNNING"; 
          document.getElementById('hud').style.display = 'block';
          document.getElementById('dev-panel').style.display = 'block';
          document.getElementById('panic-btn').style.display = 'block';
        });
        facemesh.on("predict", results => { predictions = results; });
      });
      video.hide();
    };

    window.updateDevVal = function(id, val, suffix) {
      document.getElementById(id).innerText = val + suffix;
    };

    window.toggleMute = function() {
      isMuted = !isMuted;
      Tone.Destination.mute = isMuted;
      const btn = document.getElementById('panic-btn');
      if (isMuted) { btn.innerText = "🔊 UNMUTE MASTER"; btn.classList.add('muted'); } 
      else { btn.innerText = "🔇 MUTE MASTER OUTPUT"; btn.classList.remove('muted'); }
    };

    function draw() {
      background(5, 5, 10, 80);

      if (sysState !== "RUNNING") {
        drawDiagnostics();
        return;
      }

      let db = meter ? meter.getValue() : -100;
      let visualLevel = map(db, -40, -10, 0, 1, true); 
      document.getElementById('val-db').innerText = isFinite(db) ? db.toFixed(1) + " dB" : "-∞ dB";

      push();
      translate(width, 0); scale(-1, 1); 
      let shakeIntensity = visualLevel * 30;
      translate(width/2 - video.width/2 + random(-shakeIntensity, shakeIntensity), height/2 - video.height/2 + random(-shakeIntensity, shakeIntensity));
      tint(255, 60 + (visualLevel * 100));
      image(video, 0, 0);

      if (predictions.length > 0) {
        processBiometrics();
        drawTechMask(visualLevel);
      }
      pop();
    }

    function drawDiagnostics() {
      fill(0, 255, 255); noStroke(); textAlign(CENTER, CENTER);
      if (sysState === "REQ_AUDIO") {
        textSize(24); text("ATTESA SORGENTE AUDIO...", width/2, height/2);
        textSize(16); text("Accetta il popup del browser per continuare.", width/2, height/2 + 30);
      } else if (sysState === "REQ_WEBCAM") {
        textSize(24); text("ATTESA WEBCAM...", width/2, height/2);
        textSize(16); text("Il browser sta accendendo la telecamera.", width/2, height/2 + 30);
      } else if (sysState === "LOAD_AI") {
        textSize(24); fill(255, 0, 255); text("CARICAMENTO RETE NEURALE FACEMESH...", width/2, height/2);
      } else if (sysState === "ERROR") {
        textSize(24); fill(255, 0, 0); text("ERRORE DI SISTEMA", width/2, height/2 - 20);
        textSize(16); text(errorMessage, width/2, height/2 + 20);
      }
    }

    function drawTechMask(visualLevel) {
      const keypoints = predictions[0].scaledMesh;
      let r = map(currentDelayWet, 0, 1, 0, 255);
      let g = map(Math.abs(currentPitch), 0, 12, 255, 0);
      let b = 255;
      if (currentHpfFreq > 500) b = 255; else if (currentLpfFreq < 5000) b = 0;

      stroke(r, g, b, 200); strokeWeight(1.5 + (visualLevel * 3)); noFill();
      beginShape(POINTS);
      for (let j = 0; j < keypoints.length; j++) { let [x, y] = keypoints[j]; point(x, y); }
      endShape();
    }

    function processBiometrics() {
      const keypoints = predictions[0].scaledMesh;
      let maxDelayLimit = parseFloat(document.getElementById('ctrl-maxdelay').value) / 100;
      let ySens = parseFloat(document.getElementById('ctrl-ysens').value);

      const topLip = keypoints[13], bottomLip = keypoints[14];
      let adjustedMouth = dist(topLip[0], topLip[1], bottomLip[0], bottomLip[1]);
      let targetDelayWet = adjustedMouth > 15 ? map(adjustedMouth, 15, 60, 0, 1, true) : 0;
      currentDelayWet = Math.min(targetDelayWet, maxDelayLimit);
      feedbackDelay.wet.rampTo(currentDelayWet, 0.1);

      const nose = keypoints[1];
      let noseOffsetX = nose[0] - (video.width / 2);
      let targetPitch = map(noseOffsetX, -150, 150, -12, 12, true) * -1; 
      if (Math.abs(noseOffsetX) < 25) { targetPitch = 0; pitchShift.wet.rampTo(0, 0.1); } 
      else { pitchShift.wet.rampTo(1, 0.1); }
      currentPitch = lerp(currentPitch, targetPitch, 0.1);
      pitchShift.pitch = currentPitch;

      let noseOffsetY = (nose[1] - (video.height / 2)) * ySens;
      let targetLpf = 20000, targetHpf = 0, filterStatus = "BYPASS", filterColor = "#ffcc00";
      if (noseOffsetY < -30) {
        targetHpf = map(noseOffsetY, -30, -150, 0, 6000, true); filterStatus = "HIGH-PASS"; filterColor = "#00ffff";
      } else if (noseOffsetY > 30) {
        targetLpf = map(noseOffsetY, 30, 150, 20000, 200, true); filterStatus = "LOW-PASS"; filterColor = "#ff0055";
      }
      currentLpfFreq = lerp(currentLpfFreq, targetLpf, 0.1);
      currentHpfFreq = lerp(currentHpfFreq, targetHpf, 0.1);
      djLowpass.frequency.rampTo(currentLpfFreq, 0.1);
      djHighpass.frequency.rampTo(currentHpfFreq, 0.1);

      document.getElementById('val-pitch').innerText = currentPitch.toFixed(1) + " semi
