<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Human Synth - Live Mic Override</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  
  <style>
    body { margin: 0; padding: 0; background-color: #000; color: #0f0; font-family: monospace; overflow: hidden; }
    
    #ui-container {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9); border: 2px solid #ff0055; padding: 40px; text-align: center;
      z-index: 200; box-shadow: 0 0 20px rgba(255, 0, 85, 0.3);
    }

    h1 { margin-top: 0; font-size: 1.8rem; letter-spacing: 3px; color: #ff0055; }

    .btn {
      display: inline-block; padding: 15px 30px; margin: 10px; font-size: 1.2rem;
      background: #ff0055; color: #fff; border: none; cursor: pointer; 
      text-transform: uppercase; font-weight: bold; transition: 0.1s;
    }
    .btn:hover { background: #fff; color: #ff0055; }
    .btn:active { transform: scale(0.95); }

    #hud {
      position: absolute; top: 20px; left: 20px; z-index: 100; display: none;
      background: rgba(0, 0, 0, 0.8); padding: 15px; border: 1px solid #0f0; font-size: 0.9rem;
    }
    .hud-value { color: #fff; font-weight: bold; }
    
    /* PANIC BUTTON */
    #panic-btn {
      position: absolute; bottom: 20px; right: 20px; z-index: 300; display: none;
      background: transparent; color: #ff0055; border: 2px solid #ff0055;
      padding: 10px 20px; font-size: 1rem; cursor: pointer; font-weight: bold;
    }
    #panic-btn.muted { background: #ff0055; color: #fff; }

  </style>
</head>
<body>

  <div id="ui-container">
    <h1>LIVE MIC OVERRIDE</h1>
    <p style="color:#aaa; max-width: 400px; margin: 0 auto 20px;">
      ATTENZIONE: Questo script catturerà l'audio ambientale e lo re-immetterà nelle casse. 
      Preparati a feedback acustici. Usa il tasto PANIC in basso a destra in caso di emergenza.
    </p>
    <button class="btn" id="start-btn">ATTIVA PORTALE (MICROFONO)</button>
  </div>

  <div id="hud">
    <div>AUDIO IN: <span id="val-db" class="hud-value">-∞ dB</span></div>
    <hr style="border-color:#333; my: 10px;">
    <div>PITCH (Testa L/R): <span id="val-pitch" class="hud-value">0 semitoni</span></div>
    <div>REVERB (Bocca): <span id="val-reverb" class="hud-value">0%</span></div>
  </div>

  <button id="panic-btn">🔇 MUTE (PANIC)</button>

  <script>
    let video;
    let facemesh;
    let predictions = [];
    
    // --- AUDIO NODES ---
    let mic;
    let pitchShift;
    let reverb;
    let meter;
    
    let currentPitch = 0;
    let currentReverb = 0;
    let isMuted = false;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      document.getElementById('start-btn').addEventListener('click', startLiveExperience);
      document.getElementById('panic-btn').addEventListener('click', toggleMute);
    }

    async function startLiveExperience() {
      await Tone.start(); 

      // --- SETUP CATENA AUDIO LIVE ---
      mic = new Tone.UserMedia();
      pitchShift = new Tone.PitchShift({ pitch: 0, windowSize: 0.1 });
      reverb = new Tone.Freeverb({ roomSize: 0.95, dampening: 1000 });
      reverb.wet.value = 0;
      meter = new Tone.Meter();

      // Routing: Microfono -> Pitch -> Riverbero -> Master OUT
      mic.chain(pitchShift, reverb, Tone.Destination);
      // Analizzatore volume collegato direttamente al mic
      mic.connect(meter);

      try {
        await mic.open();
        console.log("Microfono attivo e in ascolto.");
      } catch (e) {
        alert("Errore: Impossibile accedere al microfono.");
        return;
      }

      // Nascondi UI, mostra HUD e Panic Button
      document.getElementById('ui-container').style.display = 'none';
      document.getElementById('hud').style.display = 'block';
      document.getElementById('panic-btn').style.display = 'block';

      // --- SETUP WEBCAM & AI ---
      video = createCapture(VIDEO);
      video.size(640, 480);
      video.hide();

      facemesh = ml5.facemesh(video, () => console.log("FaceMesh Pronto!"));
      facemesh.on("predict", results => { predictions = results; });
    }

    function toggleMute() {
      isMuted = !isMuted;
      Tone.Destination.mute = isMuted;
      const btn = document.getElementById('panic-btn');
      if (isMuted) {
        btn.innerText = "🔊 UNMUTE";
        btn.classList.add('muted');
      } else {
        btn.innerText = "🔇 MUTE (PANIC)";
        btn.classList.remove('muted');
      }
    }

    function draw() {
      // Background che non cancella del tutto il frame precedente (effetto scia)
      background(0, 0, 0, 80); 

      if (!video || !mic || mic.state !== "started") return;

      // Misura volume per effetti visivi
      let db = meter.getValue();
      let musicLevel = map(db, -60, -10, 0, 1, true); 
      
      document.getElementById('val-db').innerText = db.toFixed(1) + " dB";

      push();
      translate(width, 0);
      scale(-1, 1); // Specchia il video
      
      // Glitch sullo sfondo dipendente da quanto è forte l'audio nella stanza
      let shakeX = random(-1, 1) * musicLevel * 30;
      let shakeY = random(-1, 1) * musicLevel * 30;
      let zoom = 1 + (musicLevel * 0.1);

      translate(width/2 - video.width/2 + shakeX, height/2 - video.height/2 + shakeY);
      scale(zoom);
      
      // Opacità dinamica: più rumore = video più visibile
      tint(255, 50 + (musicLevel * 200));
      image(video, 0, 0);

      if (predictions.length > 0) {
        processBiometrics();
        drawTechMask(musicLevel);
      }
      pop();
    }

    function drawTechMask(musicLevel) {
      const keypoints = predictions[0].scaledMesh;
      
      // La maschera si "arrossa" quando apri la bocca (riverbero alto)
      let r = map(currentReverb, 0, 1, 0, 255);
      let g = map(currentReverb, 0, 1, 255, 0);
      let b = map(Math.abs(currentPitch), 0, 12, 0, 255); // Aumenta il blu se distorci il pitch
      
      stroke(r, g, b, 200);
      strokeWeight(1 + (musicLevel * 4));
      noFill();

      beginShape(POINTS);
      for (let j = 0; j < keypoints.length; j++) {
        let [x, y] = keypoints[j];
        point(x, y);
      }
      endShape();
    }

    function processBiometrics() {
      const keypoints = predictions[0].scaledMesh;
      
      // --- 1. RIVERBERO (Bocca) ---
      const topLip = keypoints[13];
      const bottomLip = keypoints[14];
      let mouthDistance = dist(topLip[0], topLip[1], bottomLip[0], bottomLip[1]);
      
      // Threshold leggermente alzato per evitare che respirare attivi il riverbero
      currentReverb = map(mouthDistance, 8, 45, 0, 1, true);
      reverb.wet.value = lerp(reverb.wet.value, currentReverb, 0.15);

      // --- 2. PITCH SHIFT (Testa L/R) ---
      const nose = keypoints[1];
      let noseCenterOffset = nose[0] - (video.width / 2);
      
      // Range ristretto per evitare che movimenti minimi sballino l'audio
      let targetPitch = map(noseCenterOffset, -120, 120, -12, 12, true);
      targetPitch = targetPitch * -1; // Inverti asse per logica dello specchio
      
      currentPitch = lerp(currentPitch, targetPitch, 0.1);
      pitchShift.pitch = currentPitch;

      // --- 3. AGGIORNA HUD ---
      document.getElementById('val-pitch').innerText = currentPitch.toFixed(1) + " semitoni";
      document.getElementById('val-reverb').innerText = (currentReverb * 100).toFixed(0) + "%";
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
