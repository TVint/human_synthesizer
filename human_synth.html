<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>GLITCH // FEEDBACK LOOP</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  
  <style>
    body { margin: 0; padding: 0; background-color: #000; color: #ff0033; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
    
    #ui-container {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(10, 0, 0, 0.9); border: 2px solid #ff0033; padding: 40px; text-align: center;
      z-index: 200; box-shadow: 0 0 40px rgba(255, 0, 51, 0.4);
    }
    
    h1 { margin-top: 0; font-size: 2.5rem; letter-spacing: 5px; color: #ff0033; text-shadow: 2px 2px #00ffff; }
    
    .btn {
      display: inline-block; padding: 20px 40px; margin-top: 20px; font-size: 1.5rem;
      background: #ff0033; color: #000; border: none; cursor: pointer; 
      text-transform: uppercase; font-weight: bold; transition: 0.1s;
    }
    .btn:hover { background: #fff; color: #ff0033; }
    .btn:active { transform: scale(0.95); }

    #hud {
      position: absolute; top: 20px; left: 20px; z-index: 100; display: none;
      background: rgba(0, 0, 0, 0.8); padding: 20px; border: 1px solid #ff0033;
    }
    .hud-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; text-decoration: underline; }
    .hud-row { margin-bottom: 8px; font-size: 1.1rem; }
    .hud-val { color: #fff; font-weight: bold; }
    
    #panic {
      position: absolute; bottom: 20px; right: 20px; z-index: 300; display: none;
      background: #ff0033; color: #fff; border: 2px solid #fff;
      padding: 15px 30px; font-size: 1.2rem; cursor: pointer; font-weight: bold;
    }
    
    /* Glitch Animation for UI */
    @keyframes shake {
      0% { transform: translate(1px, 1px) rotate(0deg); }
      10% { transform: translate(-1px, -2px) rotate(-1deg); }
      20% { transform: translate(-3px, 0px) rotate(1deg); }
      30% { transform: translate(3px, 2px) rotate(0deg); }
      40% { transform: translate(1px, -1px) rotate(1deg); }
      50% { transform: translate(-1px, 2px) rotate(-1deg); }
      60% { transform: translate(-3px, 1px) rotate(0deg); }
      70% { transform: translate(3px, 1px) rotate(-1deg); }
      80% { transform: translate(-1px, -1px) rotate(1deg); }
      90% { transform: translate(1px, 2px) rotate(0deg); }
      100% { transform: translate(1px, -2px) rotate(-1deg); }
    }
    .glitch-active { animation: shake 0.5s infinite; color: #fff; }
  </style>
</head>
<body>

  <div id="ui-container">
    <h1>SYS.ERROR</h1>
    <p style="color:#aaa; max-width: 400px; margin: 0 auto; line-height: 1.5;">
      Questa esperienza utilizza il microfono per generare volontariamente un feedback di errore acustico (Larsen).<br><br>
      <b>ABBASSA IL VOLUME DELLE CASSE PRIMA DI INIZIARE.</b>
    </p>
    <button class="btn" onclick="window.igniteSystem()">IGNITE FEEDBACK</button>
  </div>

  <div id="hud">
    <div class="hud-title">DIAGNOSTICA ERRORE</div>
    <div class="hud-row">MIC LEVEL: <span id="val-db" class="hud-val">-∞</span> dB</div>
    <div class="hud-row">FEEDBACK (Bocca): <span id="val-delay" class="hud-val">0</span>%</div>
    <div class="hud-row">MUTATION (Testa X): <span id="val-pitch" class="hud-val">0</span> semi</div>
    <div class="hud-row">CRUSH (Testa Y): <span id="val-crush" class="hud-val">0</span>%</div>
    <div id="warning" style="color: #00ffff; margin-top: 15px; font-weight: bold; display: none;">CRITICAL LOOP DETECTED</div>
  </div>

  <button id="panic" onclick="window.emergencyMute()">EMERGENCY STOP (MUTE)</button>

  <script>
    // Variabili Globali
    let video, facemesh, predictions = [];
    let mic, pitchShift, distortion, feedbackDelay, limiter, meter;
    
    // Variabili di stato correnti
    let curPitch = 0, curDelay = 0, curDist = 0;
    let isMuted = false;
    let isRunning = false;

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight);
      canvas.position(0, 0);
      canvas.style('z-index', '-1');
    }

    // AVVIO DEL SISTEMA (Chiamata direttamente dal pulsante HTML)
    window.igniteSystem = async function() {
      document.getElementById('ui-container').innerHTML = "<h2 style='color:#fff'>INIZIALIZZAZIONE...</h2><p>Accetta il microfono e la webcam.</p>";
      
      try {
        await Tone.start();
        
        // --- 1. SETUP AUDIO DESTRUTTIVO ---
        mic = new Tone.UserMedia();
        
        // Pitch Shift per "stritolare" le frequenze
        pitchShift = new Tone.PitchShift(0);
        pitchShift.windowSize = 0.05;

        // Distorsione aggressiva (Crusher)
        distortion = new Tone.Distortion(0.8);
        distortion.wet.value = 0; // Inizia pulito

        // Delay infinito per creare il vero Larsen
        feedbackDelay = new Tone.FeedbackDelay("16n", 0.95);
        feedbackDelay.wet.value = 0;

        // Limiter fondamentale per non far esplodere le casse fisicamente
        limiter = new Tone.Limiter(-1);
        meter = new Tone.Meter();

        // ROUTING: Mic -> Pitch -> Distorsione -> Delay -> Limiter -> Uscita
        mic.chain(pitchShift, distortion, feedbackDelay, limiter, Tone.Destination);
        mic.connect(meter);

        await mic.open();
        
      } catch (e) {
        alert("Impossibile accedere al Microfono. Controlla i permessi.");
        return;
      }

      // --- 2. SETUP WEBCAM & AI ---
      video = createCapture(VIDEO, () => {
        document.getElementById('ui-container').innerHTML = "<h2 style='color:#00ffff'>CARICAMENTO AI...</h2><p>Attendi qualche secondo.</p>";
        
        facemesh = ml5.facemesh(video, () => {
          // TUTTO PRONTO!
          isRunning = true;
          document.getElementById('ui-container').style.display = 'none';
          document.getElementById('hud').style.display = 'block';
          document.getElementById('panic').style.display = 'block';
        });
        
        facemesh.on("predict", results => { predictions = results; });
      });
      video.hide();
    };

    window.emergencyMute = function() {
      isMuted = !isMuted;
      Tone.Destination.mute = isMuted;
      const btn = document.getElementById('panic');
      if (isMuted) {
        btn.innerText = "AUDIO MUTATO (CLICCA PER SBLOCCARE)";
        btn.style.background = "#fff";
        btn.style.color = "#ff0033";
      } else {
        btn.innerText = "EMERGENCY STOP (MUTE)";
        btn.style.background = "#ff0033";
        btn.style.color = "#fff";
      }
    };

    // --- LOOP GRAFICO (Il Caos) ---
    function draw() {
      // Effetto scia pesante. Se il volume è alto, lo sfondo diventa rosso sangue.
      let db = meter ? meter.getValue() : -100;
      let volNorm = map(db, -40, -5, 0, 1, true); // Da 0.0 a 1.0
      
      background(volNorm * 50, 0, 0, 50);

      if (!isRunning) return;

      document.getElementById('val-db').innerText = db.toFixed(1);

      push();
      translate(width, 0); 
      scale(-1, 1); // Specchio

      // EFFETTO TERREMOTO VISIVO basato sul rumore
      let shake = volNorm * 50; 
      translate(width/2 - video.width/2 + random(-shake, shake), height/2 - video.height/2 + random(-shake, shake));
      
      // La webcam diventa visibile solo quando c'è rumore o movimento
      tint(255, 30 + (volNorm * 200));
      
      // Filtro colore: il video diventa rosso se c'è distorsione
      if (curDist > 0.5) tint(255, 0, 0, 150);
      
      image(video, 0, 0);

      if (predictions.length > 0) {
        processMocap();
        drawCyberMask(volNorm);
      }
      pop();

      // UI Feedback Visivo
      if (volNorm > 0.8) {
        document.getElementById('warning').style.display = 'block';
        document.getElementById('hud').classList.add('glitch-active');
      } else {
        document.getElementById('warning').style.display = 'none';
        document.getElementById('hud').classList.remove('glitch-active');
      }
    }

    // DISEGNO DELLA MASCHERA "BRUTALISTA"
    function drawCyberMask(volNorm) {
      const pts = predictions[0].scaledMesh;
      
      // La maschera "esplode" se urli o c'è rumore
      let explode = volNorm * 20;

      stroke(255, 0, 51, 200); // Rosso acceso
      strokeWeight(2 + (volNorm * 5));
      noFill();

      beginShape(POINTS);
      for (let j = 0; j < pts.length; j++) {
        let [x, y] = pts[j];
        // I punti impazziscono col volume
        point(x + random(-explode, explode), y + random(-explode, explode));
      }
      endShape();
    }

    // MOTORE INTERATTIVO
    function processMocap() {
      const pts = predictions[0].scaledMesh;
      
      // 1. BOCCA = FEEDBACK LOOP
      // Più apri la bocca, più crei eco e inneschi il fischio (Larsen)
      const topLip = pts[13], bottomLip = pts[14];
      let mouthDist = dist(topLip[0], topLip[1], bottomLip[0], bottomLip[1]);
      
      let targetDelay = mouthDist > 10 ? map(mouthDist, 10, 50, 0, 1, true) : 0;
      curDelay = lerp(curDelay, targetDelay, 0.1);
      feedbackDelay.wet.rampTo(curDelay, 0.1);

      // 2. TESTA (Asse X) = MUTAZIONE PITCH
      // Sposta la testa per trasformare la tua voce o il fischio in demoniaco/alieno
      const nose = pts[1];
      let noseX = nose[0] - (video.width / 2);
      let targetPitch = map(noseX, -150, 150, -12, 12, true) * -1; 
      
      curPitch = lerp(curPitch, targetPitch, 0.1);
      pitchShift.pitch = curPitch;

      // 3. TESTA (Asse Y) = DISTORSIONE / BITCRUSH
      // Alza o abbassa la testa per "schiacciare" il suono
      let noseY = nose[1] - (video.height / 2);
      let targetDist = map(Math.abs(noseY), 20, 150, 0, 1, true); // Si attiva se vai molto su o molto giù
      
      curDist = lerp(curDist, targetDist, 0.1);
      distortion.wet.rampTo(curDist, 0.1);

      // Aggiorna Schermo
      document.getElementById('val-delay').innerText = (curDelay * 100).toFixed(0);
      document.getElementById('val-pitch').innerText = curPitch.toFixed(1);
      document.getElementById('val-crush').innerText = (curDist * 100).toFixed(0);
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
