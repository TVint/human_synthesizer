<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>VOID RIDER // NEURAL LINK</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.40/Tone.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    body { 
      margin: 0; padding: 0; background-color: #020205; color: #00ffff; 
      font-family: 'Share Tech Mono', monospace; overflow: hidden; 
    }
    
    #ui-container {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(5, 10, 20, 0.85); border: 1px solid #00ffff; 
      padding: 40px; text-align: center; z-index: 200; width: 500px;
      backdrop-filter: blur(10px); border-radius: 5px;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.2), inset 0 0 15px rgba(0, 255, 255, 0.1);
    }
    
    h1 { 
      margin-top: 0; font-size: 2.8rem; letter-spacing: 4px; color: #00ffff; 
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.8); margin-bottom: 15px;
    }
    
    #status-msg { 
      margin: 20px 0; color: #a0c0c0; font-size: 1.1rem; line-height: 1.5; 
      min-height: 60px;
    }
    
    .btn {
      display: inline-block; padding: 15px 40px; margin-top: 15px; font-size: 1.5rem;
      background: transparent; color: #00ffff; border: 2px solid #00ffff;
      cursor: pointer; text-transform: uppercase; font-weight: bold; 
      border-radius: 3px; letter-spacing: 2px; transition: all 0.3s;
      position: relative; z-index: 1000;
    }
    .btn:hover { background: #00ffff; color: #000; box-shadow: 0 0 20px #00ffff; }

    #hud {
      position: absolute; top: 20px; left: 20px; z-index: 100; display: none;
      background: rgba(0, 5, 10, 0.7); padding: 20px; border-left: 3px solid #00ffff;
    }
    .hud-title { font-size: 1.2rem; color: #fff; margin-bottom: 10px; text-decoration: underline;}
    .hud-row { margin-bottom: 8px; font-size: 1.1rem; color: #777;}
    .hud-val { color: #00ffff; font-weight: bold; }
    
    #panic {
      position: absolute; top: 20px; right: 20px; z-index: 300; display: none;
      background: transparent; color: #ff0033; border: 2px solid #ff0033;
      padding: 10px 20px; font-size: 1rem; cursor: pointer;
    }
    #panic:hover { background: #ff0033; color: #000; }
  </style>
</head>
<body>

  <div id="ui-container">
    <h1>VOID RIDER</h1>
    <div id="status-msg">
      <b>SISTEMA DI NAVIGAZIONE NEURALE</b><br><br>
      Attivando il link, i propulsori e il reattore audio saranno vincolati ai tuoi movimenti facciali.<br><span style="color:#ff0033">Attenzione al feedback quantico (Larsen).</span>
    </div>
    <button class="btn" id="action-btn">ESTABLISH LINK</button>
  </div>

  <div id="hud">
    <div class="hud-title">TELEMETRIA SCAFO</div>
    <div class="hud-row">GRAVITÀ (X): <span id="val-pitch" class="hud-val">0</span> st</div>
    <div class="hud-row">PROPULSORI (Y): <span id="val-flanger" class="hud-val">0</span>%</div>
    <div class="hud-row">VUOTO SPAZIALE (Z): <span id="val-space" class="hud-val">0</span>%</div>
  </div>

  <button id="panic" onclick="window.emergencyMute()">TAGLIO MOTORI</button>

  <script>
    let video, facemesh, predictions = [];
    let pitchShift, flanger, spaceDelay, spaceReverb, limiter, meter;
    
    let curPitch = 0, curSpace = 0, curFlanger = 0;
    let isMuted = false, isRunning = false;

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight);
      canvas.position(0, 0);
      canvas.style('z-index', '-1');
      canvas.style('pointer-events', 'none'); 
    }

    // --- BINDING SICURO DEL PULSANTE ---
    document.getElementById('action-btn').addEventListener('click', async () => {
      const msg = document.getElementById('status-msg');
      const btn = document.getElementById('action-btn');
      
      btn.style.display = 'none';
      msg.innerHTML = "<span style='color:#00ffff;'>Richiesta permessi Sensori A/V...</span><br>Consenti nel popup del browser in alto a sinistra.";
      
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, 
          video: true 
        });
        
        msg.innerHTML = "Sincronizzazione Motore Audio...";
        await Tone.start();
        
        const audioContext = Tone.getContext().rawContext;
        const micSource = audioContext.createMediaStreamSource(stream);
        
        // --- MOTORE AUDIO SPAZIALE ---
        pitchShift = new Tone.PitchShift(0);
        pitchShift.windowSize = 0.04;

        flanger = new Tone.Chorus(4, 2.5, 0.8).start(); 
        flanger.wet.value = 0;

        spaceDelay = new Tone.FeedbackDelay("8n", 0.6);
        spaceDelay.wet.value = 0;
        
        spaceReverb = new Tone.Freeverb({ roomSize: 0.9, dampening: 2000 });
        spaceReverb.wet.value = 0;

        limiter = new Tone.Limiter(-2); 
        meter = new Tone.Meter(); 

        // ROUTING NATIVO E SICURO (Fix dell'errore di Dizionario)
        Tone.connect(micSource, pitchShift);
        Tone.connect(micSource, meter);
        
        pitchShift.chain(flanger, spaceDelay, spaceReverb, limiter, Tone.Destination);

        msg.innerHTML = "Allineamento AI FaceMesh...";

        video = createCapture(VIDEO, () => {
          facemesh = ml5.facemesh(video, () => {
            isRunning = true;
            document.getElementById('ui-container').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('panic').style.display = 'block';
          });
          facemesh.on("predict", results => { predictions = results; });
        });
        video.hide();

      } catch (e) {
        msg.innerHTML = "<span style='color:#ff0033;'>ERRORE SISTEMA:</span> " + e.message;
        btn.style.display = 'inline-block'; 
        btn.innerText = "RIPROVA";
        console.error("Dettaglio Errore:", e);
      }
    });

    window.emergencyMute = function() {
      isMuted = !isMuted;
      Tone.Destination.mute = isMuted;
      document.getElementById('panic').innerText = isMuted ? "SBLOCCA MOTORI" : "TAGLIO MOTORI";
    }

    function draw() {
      background(5);
      if (!isRunning) return;

      let db = meter ? meter.getValue() : -100;
      let isCritical = db > -8; 

      push();
      translate(width, 0); scale(-1, 1);

      let shake = isCritical ? random(-20, 20) : 0;
      translate(width/2 - video.width/2 + shake, height/2 - video.height/2 + shake);
      
      let rgbOffset = map(Math.abs(curPitch), 0, 24, 0, 25);
      
      blendMode(SCREEN);
      tint(255, 0, 0, 150);
      image(video, -rgbOffset, 0);
      tint(0, 255, 255, 150);
      image(video, rgbOffset, 0);
      tint(255, 255, 255, 180);
      image(video, 0, 0);
      blendMode(BLEND);

      if (predictions.length > 0) {
        processMocap();
        drawCyberMask(isCritical);
      }
      pop();

      if (curFlanger > 0.1) {
        stroke(0, 255, 255, map(curFlanger, 0, 1, 0, 50));
        strokeWeight(2);
        for(let i = 0; i < height; i += 8) { line(0, i, width, i); }
      }

      drawVUMeter(db, isCritical);

      if (isCritical) {
        fill(255, 0, 50, random(50, 150));
        rect(0, 0, width, height);
        fill(255);
        textAlign(CENTER, CENTER);
        textSize(64); 
        text("⚠ HULL INTEGRITY CRITICAL ⚠", width/2 + random(-5,5), height/2 + random(-5,5));
      }
    }

    function drawVUMeter(db, isCritical) {
      let rectWidth = 300;
      let rectHeight = 20;
      let x = width/2 - rectWidth/2;
      let y = height - 60;

      fill(20, 20, 30);
      stroke(0, 255, 255);
      strokeWeight(1);
      rect(x, y, rectWidth, rectHeight);

      let fillWidth = map(db, -40, 0, 0, rectWidth, true);
      
      let r = map(db, -20, -5, 0, 255, true);
      let g = map(db, -20, -5, 255, 0, true);
      let b = map(db, -20, -5, 255, 0, true);
      
      noStroke();
      fill(r, g, b);
      rect(x, y, fillWidth, rectHeight);

      textAlign(CENTER, BOTTOM);
      textSize(16); 
      if (isCritical && frameCount % 4 < 2) {
        fill(255, 0, 50);
        text("LARSEN EFFECT ALERT // FEEDBACK OVERLOAD", width/2, y - 10);
      } else {
        fill(0, 255, 255);
        text("AUDIO CORE STATUS", width/2, y - 10);
      }
    }

    function drawCyberMask(isCritical) {
      const pts = predictions[0].scaledMesh;
      
      stroke(isCritical ? 255 : 0, isCritical ? 0 : 255, isCritical ? 50 : 255, 100);
      strokeWeight(1.5);
      noFill();
      beginShape(POINTS);
      for (let j = 0; j < pts.length; j++) { point(pts[j][0], pts[j][1]); }
      endShape();

      if (curSpace > 0.1) {
        let topL = pts[13], botL = pts[14];
        let mouthCenter = [(topL[0]+botL[0])/2, (topL[1]+botL[1])/2];
        noStroke();
        let glowSize = map(curSpace, 0, 1, 10, 150);
        fill(0, 255, 255, 30); ellipse(mouthCenter[0], mouthCenter[1], glowSize, glowSize);
        fill(255, 255, 255, 50); ellipse(mouthCenter[0], mouthCenter[1], glowSize/2, glowSize/2);
      }
    }

    function processMocap() {
      const pts = predictions[0].scaledMesh;
      const nose = pts[1];
      const topLip = pts[13], bottomLip = pts[14];

      let mouthDist = dist(topLip[0], topLip[1], bottomLip[0], bottomLip[1]);
      let targetSpace = mouthDist > 8 ? map(mouthDist, 8, 30, 0, 1, true) : 0;
      curSpace = lerp(curSpace, targetSpace, 0.15);
      spaceDelay.wet.value = curSpace;
      spaceReverb.wet.value = curSpace;

      let noseX = nose[0] - (video.width / 2);
      let targetPitch = 0;
      if (Math.abs(noseX) > 20) {
        targetPitch = map(noseX, -150, 150, -24, 24, true); 
      }
      curPitch = lerp(curPitch, targetPitch, 0.1);
      pitchShift.pitch = curPitch;

      let noseY = nose[1] - (video.height / 2);
      let targetFlanger = Math.abs(noseY) > 20 ? map(Math.abs(noseY), 20, 150, 0, 1, true) : 0;
      curFlanger = lerp(curFlanger, targetFlanger, 0.1);
      flanger.wet.value = curFlanger;

      document.getElementById('val-space').innerText = (curSpace * 100).toFixed(0);
      document.getElementById('val-pitch').innerText = curPitch.toFixed(1);
      document.getElementById('val-flanger').innerText = (curFlanger * 100).toFixed(0);
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
