<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>VOID RIDER // ULTIMA CHANCE</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.40/Tone.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    body { margin: 0; padding: 0; background-color: #000; color: #0ff; font-family: 'Share Tech Mono', monospace; overflow: hidden; }
    
    #ui-container {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0, 5, 15, 0.9); border: 2px solid #0ff; padding: 40px; text-align: center; z-index: 9999;
      box-shadow: 0 0 50px rgba(0, 255, 255, 0.4);
    }
    h1 { margin: 0 0 20px 0; font-size: 2.5rem; letter-spacing: 5px; border-bottom: 2px solid #0ff; padding-bottom: 10px; }
    .btn { padding: 15px 40px; font-size: 1.2rem; background: transparent; color: #0ff; border: 1px solid #0ff; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: 0.3s; }
    .btn:hover { background: #0ff; color: #000; box-shadow: 0 0 30px #0ff; }
    
    .hotspot {
      position: absolute; z-index: 1000; display: none; cursor: pointer; transition: 0.3s;
      justify-content: center; align-items: center; text-align: center; color: rgba(0,255,255,0.3); font-size: 1.5rem; font-weight: bold; border: 1px dashed rgba(0,255,255,0.2);
    }
    .hotspot:hover { background: rgba(0, 255, 255, 0.1); border: 1px solid #0ff; color: #0ff; text-shadow: 0 0 10px #0ff; }
    #hs-top { top: 0; left: 20%; width: 60%; height: 60px; }
    #hs-bottom { bottom: 0; left: 20%; width: 60%; height: 60px; }
    #hs-left { top: 10%; left: 0; width: 80px; height: 80%; }
    #hs-right { top: 10%; right: 0; width: 80px; height: 80%; }

    #tutorial-modal {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #000; border: 2px solid #0ff; box-shadow: 0 0 50px #0ff; padding: 40px; z-index: 9000; display: none; width: 500px; text-align: center;
    }
  </style>
</head>
<body>

  <div id="ui-container">
    <h1>VOID RIDER // OVERRIDE</h1>
    <p>Calibrazione Spaziale Massima. Ignizione audio al 100%.</p>
    <button class="btn" id="action-btn">ATTIVA SISTEMA</button>
  </div>

  <div id="hs-top" class="hotspot" onclick="showTutorial('UP')">FLANGER</div>
  <div id="hs-bottom" class="hotspot" onclick="showTutorial('DOWN')">CRUSH</div>
  <div id="hs-left" class="hotspot" onclick="showTutorial('LEFT')">ALIEN</div>
  <div id="hs-right" class="hotspot" onclick="showTutorial('RIGHT')">PITCH</div>

  <div id="tutorial-modal">
    <h2 id="tut-title" style="color:#0ff;">TITOLO</h2>
    <p id="tut-desc" style="color:#fff; font-size:1.2rem;">Descrizione...</p>
    <button class="btn" onclick="document.getElementById('tutorial-modal').style.display='none'">CHIUDI</button>
  </div>

  <script>
    let video, facemesh, predictions = [];
    let pitchShift, ringMod, flanger, bitcrusher, spaceReverb, meter;
    let cPitch = 0, cRing = 0, cFlange = 0, cBit = 0, cSpace = 0;
    let isRunning = false, stars = [];

    // Setup Stelle Iperspazio
    class Star {
      constructor() {
        this.x = random(-width, width); this.y = random(-height, height); this.z = random(width); this.pz = this.z;
      }
      update(speed) {
        this.z -= speed;
        if (this.z < 1) { this.z = width; this.x = random(-width, width); this.y = random(-height, height); this.pz = this.z; }
      }
      show() {
        let sx = map(this.x / this.z, 0, 1, 0, width); let sy = map(this.y / this.z, 0, 1, 0, height);
        let px = map(this.x / this.pz, 0, 1, 0, width); let py = map(this.y / this.pz, 0, 1, 0, height);
        this.pz = this.z;
        stroke(255); strokeWeight(map(this.z, 0, width, 3, 0));
        line(px, py, sx, sy); // Linea per il motion blur
      }
    }

    function setup() {
      createCanvas(windowWidth, windowHeight).position(0, 0).style('z-index', '-1');
      for (let i = 0; i < 800; i++) stars.push(new Star());
    }

    document.getElementById('action-btn').addEventListener('click', async () => {
      document.getElementById('ui-container').style.display = 'none';
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
      await Tone.start();
      const mic = Tone.getContext().rawContext.createMediaStreamSource(stream);

      // AUDIO ENGINE ESAGERATO
      meter = new Tone.Meter();
      pitchShift = new Tone.PitchShift(0); pitchShift.windowSize = 0.05; pitchShift.wet.value = 0;
      ringMod = new Tone.FrequencyShifter(400); ringMod.wet.value = 0; // Molto più alieno
      flanger = new Tone.Chorus({ frequency: 0.1, delayTime: 1, depth: 1, feedback: 0.95 }).start(); flanger.wet.value = 0; // Fischio turbina
      bitcrusher = new Tone.BitCrusher(2); bitcrusher.wet.value = 0; // Distruzione totale a 2-bit
      spaceReverb = new Tone.Freeverb({ roomSize: 0.95, dampening: 500 }); spaceReverb.wet.value = 0;

      Tone.connect(mic, meter);
      Tone.connect(mic, pitchShift);
      pitchShift.chain(ringMod, bitcrusher, flanger, spaceReverb, new Tone.Limiter(-1), Tone.Destination);

      video = createCapture(VIDEO, () => {
        facemesh = ml5.facemesh(video, () => {
          isRunning = true;
          document.querySelectorAll('.hotspot').forEach(el => el.style.display = 'flex');
        });
        facemesh.on("predict", r => predictions = r);
      });
      video.hide();
    });

    window.showTutorial = function(type) {
      const m = document.getElementById('tutorial-modal');
      const t = document.getElementById('tut-title'); const d = document.getElementById('tut-desc');
      if(type==='LEFT') { t.innerText="MODULATORE AD ANELLO"; d.innerText="Sposta la testa a SINISTRA. Crea frequenze aliene inarmoniche."; }
      if(type==='RIGHT'){ t.innerText="PITCH UP"; d.innerText="Sposta la testa a DESTRA. Alza la voce di 2 ottave."; }
      if(type==='UP')   { t.innerText="WARP FLANGER"; d.innerText="Guarda in ALTO. Innesca il reattore e accelera lo starfield."; }
      if(type==='DOWN') { t.innerText="BITCRUSHER 2-BIT"; d.innerText="Guarda in BASSO. Disintegra il segnale digitale e pixelizza l'interfaccia."; }
      m.style.display = 'block';
    }

    function draw() {
      background(0, 5, 15);
      if (!isRunning) return;

      let vol = map(meter.getValue(), -30, -5, 0, 1, true);

      // MAPPING
      if (predictions.length > 0) {
        let pts = predictions[0].scaledMesh;
        let nX = (pts[1][0] - video.width/2) / (video.width/2); 
        let nY = (pts[1][1] - video.height/2) / (video.height/2);

        // Bocca (Z)
        let mDist = dist(pts[13][0], pts[13][1], pts[14][0], pts[14][1]);
        cSpace = lerp(cSpace, mDist > 10 ? map(mDist, 10, 30, 0, 1, true) : 0, 0.15);
        spaceReverb.wet.value = cSpace;

        // X (Pitch / Ring)
        let tPitch = 0, tRing = 0;
        if (nX < -0.15) tPitch = map(nX, -0.15, -0.8, 0, 24, true); // Specchiato (Destra fisica)
        else if (nX > 0.15) tRing = map(nX, 0.15, 0.8, 0, 1, true); // Sinistra fisica
        
        cPitch = lerp(cPitch, tPitch, 0.15); pitchShift.pitch = cPitch; pitchShift.wet.value = cPitch > 1 ? 1 : 0;
        cRing = lerp(cRing, tRing, 0.15); ringMod.wet.value = cRing;

        // Y (Flange / Bit)
        let tFlange = 0, tBit = 0;
        if (nY < -0.1) tFlange = map(nY, -0.1, -0.8, 0, 1, true);
        else if (nY > 0.15) tBit = map(nY, 0.15, 0.8, 0, 1, true);
        
        cFlange = lerp(cFlange, tFlange, 0.2); flanger.wet.value = cFlange;
        cBit = lerp(cBit, tBit, 0.2); bitcrusher.wet.value = cBit;
      }

      // 1. SFONDO STELLE WARP
      push(); translate(width/2, height/2);
      let warpSpeed = map(cFlange, 0, 1, 1, 80); // Velocità folle quando guardi in alto
      for (let s of stars) { s.update(warpSpeed); s.show(); }
      pop();

      // Centro Schermo
      push();
      translate(width/2, height/2);

      // 2. COLONNE NEURALI (Dietro l'oblò)
      drawSynapses();

      // 3. OBLÒ CENTRALE AL NEON
      stroke(0, 255, 255); strokeWeight(8); fill(0, 0, 0, 200);
      ellipse(0, 0, 450, 450); // Finestra esterna
      
      // 4. GREEN SCREEN OLOGRAFICO (Solo la faccia)
      if (predictions.length > 0) {
        let pts = predictions[0].scaledMesh;
        
        // Crea la maschera di ritaglio ovale basata sul viso
        drawingContext.save();
        beginShape();
        // Disegno un ovale "allargato" attorno ai punti del viso per isolarlo dallo sfondo della stanza
        let faceW = dist(pts[234][0], pts[234][1], pts[454][0], pts[454][1]) * 1.5; // Larghezza orecchie espansa
        let faceH = dist(pts[10][0], pts[10][1], pts[152][0], pts[152][1]) * 1.5; // Fronte-mento espanso
        // Offset dal centro video
        let faceCX = (pts[1][0] - video.width/2); 
        let faceCY = (pts[1][1] - video.height/2);
        
        // La clip inverte le X perché poi specchieremo il video
        ellipse(-faceCX, faceCY, faceW, faceH); 
        drawingContext.clip();

        // Disegna il video dentro la clip (specchiato)
        push();
        scale(-1, 1); 
        
        // Effetto visivo Glitch/Bitcrusher sul video
        if(cBit > 0.2) { filter(POSTERIZE, 3); }
        
        image(video, -video.width/2, -video.height/2);
        pop();
        drawingContext.restore(); // Chiude la maschera

        // 5. CASCHETTO GEOMETRICO (Disegnato SOPRA la faccia isolata)
        drawHelmet(pts, faceCX, faceCY, faceW, faceH);
      }
      pop();
    }

    function drawHelmet(pts, cx, cy, w, h) {
      push();
      translate(-cx, cy); // Segue il movimento della testa
      stroke(0, 255, 255); noFill();
      
      // Visore Cyberpunk
      strokeWeight(3);
      arc(0, -h/4, w*0.9, h*0.5, PI, 0); // Arco superiore
      line(-w*0.45, -h/4, -w*0.4, h/4); // Lati
      line(w*0.45, -h/4, w*0.4, h/4);
      
      // Griglia mentoniera
      strokeWeight(1);
      for(let i=-20; i<=20; i+=10) { line(i, h/3, i, h/2); }
      
      // Target occhi
      rectMode(CENTER); stroke(255, 0, 0);
      rect(-w*0.2, -h/8, 20, 10); rect(w*0.2, -h/8, 20, 10);
      
      // Glow bocca (Reverb)
      if (cSpace > 0.1) {
        noStroke(); fill(0, 255, 255, cSpace * 100);
        ellipse(0, h/4, 80 * cSpace, 80 * cSpace);
      }
      pop();
    }

    function drawSynapses() {
      // Disegna i cavi fissi che partono dal centro
      let col = color(0, 255, 255, 50);
      strokeWeight(4); noFill();
      
      // Funzione flusso neuroni
      function stream(endX, endY, intensity, activeColor) {
        stroke(intensity > 0.1 ? activeColor : col);
        line(0, 0, endX, endY);
        
        if (intensity > 0.1) {
          let t = (frameCount * 0.05 * (1 + intensity*2)) % 1; // Scorre super veloce
          let px = lerp(0, endX, t); let py = lerp(0, endY, t);
          noStroke(); fill(activeColor); ellipse(px, py, 20, 20); fill(255); ellipse(px, py, 10, 10);
        }
      }

      // UP (Flange), DOWN (Bit), LEFT (Ring), RIGHT (Pitch)
      stream(0, -height/2, cFlange, color(255, 200, 0));
      stream(0, height/2, cBit, color(0, 255, 50));
      stream(-width/2, 0, cRing, color(255, 0, 255));
      stream(width/2, 0, cPitch/24, color(0, 150, 255));
    }
  </script>
</body>
</html>
