<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VOID RIDER // MOBILE TACTICAL</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.40/Tone.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    body { margin: 0; padding: 0; background-color: #020205; color: #00ffff; font-family: 'Share Tech Mono', monospace; overflow: hidden; }
    
    /* ROTATION BANNER */
    #rotate-banner {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #020205; z-index: 9999; flex-direction: column; justify-content: center; align-items: center;
    }
    @media screen and (orientation: portrait) { #rotate-banner { display: flex; } }

    #ui-container {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(2, 5, 15, 0.95); border: 1px solid #00ffff; 
      padding: 30px; text-align: center; z-index: 200; width: 80%; max-width: 500px;
      backdrop-filter: blur(10px); box-shadow: 0 0 40px rgba(0, 255, 255, 0.2);
    }
    
    h1 { font-size: 1.8rem; letter-spacing: 2px; border-bottom: 1px solid #00ffff; padding-bottom: 10px; margin: 0; }
    #status-msg { margin: 20px 0; font-size: 0.9rem; line-height: 1.4; color: #88ccaa; }
    .btn { padding: 15px 30px; background: rgba(0, 255, 255, 0.1); color: #00ffff; border: 1px solid #00ffff; cursor: pointer; text-transform: uppercase; font-weight: bold; }
    
    #panic {
      position: absolute; top: 10px; right: 10px; z-index: 300; display: none;
      background: rgba(255, 0, 50, 0.2); color: #ff0032; border: 1px solid #ff0032;
      padding: 8px 15px; cursor: pointer; font-size: 0.7rem;
    }
  </style>
</head>
<body>

  <div id="rotate-banner">
    <h1 style="border:none">RUOTA IL DISPOSITIVO</h1>
    <p>Orientamento Landscape necessario per la navigazione neurale.</p>
  </div>

  <div id="ui-container">
    <h1>VOID RIDER // LINK.START()</h1>
    <div id="status-msg">
      <b>SISTEMA HUD MOBILE V2.3</b><br>
      > Noise Gate: Attivo<br>
      > Jet Flanger: Reattivo<br>
      <span style="color:#ff0033">> WARNING: Feedback quantico monitorato.</span>
    </div>
    <button class="btn" id="action-btn">ESTABLISH NEURAL LINK</button>
  </div>

  <button id="panic" onclick="window.emergencyMute()">TAGLIO MOTORI</button>

  <script>
    let video, facemesh, predictions = [];
    let pitchShift, chebyshev, flangerEffect, spaceDelay, spaceReverb, meter;
    let curPitch = 0, curPitchWet = 0, curSpace = 0, curFlanger = 0;
    let headX = 0, headY = 0, isRunning = false;

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight);
      canvas.position(0, 0); canvas.style('z-index', '-1'); canvas.style('pointer-events', 'none'); 
    }

    document.getElementById('action-btn').addEventListener('click', async () => {
      document.getElementById('action-btn').style.display = 'none';
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
        await Tone.start();
        const micSource = Tone.getContext().rawContext.createMediaStreamSource(stream);

        // Audio Engine
        let noiseGate = new Tone.Gate(-40, 0.1);
        pitchShift = new Tone.PitchShift(0);
        chebyshev = new Tone.Chebyshev(50);
        flangerEffect = new Tone.Chorus({ frequency: 0.2, delayTime: 2, depth: 1, feedback: 0.85, spread: 180 }).start();
        spaceDelay = new Tone.FeedbackDelay("16n", 0.6);
        spaceReverb = new Tone.Freeverb({ roomSize: 0.85, dampening: 1500 });
        let masterVol = new Tone.Volume(-15);
        meter = new Tone.Meter();

        Tone.connect(micSource, noiseGate);
        noiseGate.chain(meter, pitchShift);
        pitchShift.chain(chebyshev, flangerEffect, spaceDelay, spaceReverb, masterVol, Tone.Destination);

        video = createCapture(VIDEO, () => {
          facemesh = ml5.facemesh(video, () => {
            isRunning = true;
            document.getElementById('ui-container').style.display = 'none';
            document.getElementById('panic').style.display = 'block';
          });
          facemesh.on("predict", r => predictions = r);
        });
        video.hide();
      } catch (e) { alert("Accesso negato: " + e.message); }
    });

    function draw() {
      background(3, 5, 10);
      if (!isRunning) return;

      let db = meter.getValue();
      let vol = map(db, -25, -2, 0, 1, true);

      if (predictions.length > 0) {
        let pts = predictions[0].scaledMesh;
        let nose = pts[1];
        let topL = pts[13], botL = pts[14];

        // LOGICA MAPPING (Ricalibrata)
        let mDist = dist(topL[0], topL[1], botL[0], botL[1]);
        curSpace = lerp(curSpace, mDist > 12 ? map(mDist, 12, 35, 0, 0.8, true) : 0, 0.2);
        spaceDelay.wet.value = curSpace; spaceReverb.wet.value = curSpace;

        headX = (video.width/2) - nose[0]; 
        let tPitch = Math.abs(headX) > 25 ? map(headX, -150, 150, -24, 24, true) : 0;
        curPitch = lerp(curPitch, tPitch, 0.15);
        curPitchWet = lerp(curPitchWet, Math.abs(tPitch) > 0 ? 1 : 0, 0.15);
        pitchShift.pitch = curPitch; pitchShift.wet.value = curPitchWet;

        headY = (video.height/2) - nose[1];
        let tFlange = headY > 15 ? map(headY, 15, 90, 0, 1, true) : 0;
        curFlanger = lerp(curFlanger, tFlange, 0.2); 
        chebyshev.wet.value = curFlanger; flangerEffect.wet.value = curFlanger;
      }

      push(); translate(width, 0); scale(-1, 1);
      let shake = vol > 0.8 ? random(-10, 10) : 0;
      translate(width/2 - video.width/2 + shake, height/2 - video.height/2 + shake);
      
      let off = map(Math.abs(curPitch), 0, 24, 0, 20);
      blendMode(SCREEN);
      tint(255, 0, 50, 100); image(video, -off, 0);
      tint(0, 255, 255, 100); image(video, off, 0);
      tint(255, 255, 255, 150); image(video, 0, 0);
      blendMode(BLEND);
      pop();

      // HUD semplificato per mobile
      drawTacticalUI(db, vol);
    }

    function drawTacticalUI(db, vol) {
      let c = vol > 0.8 ? color(255, 0, 50) : color(0, 255, 255);
      stroke(c); noFill();
      rect(width/2 - 150, height - 60, 300, 15);
      fill(c); noStroke();
      rect(width/2 - 150, height - 60, map(vol, 0, 1, 0, 300, true), 15);
      if (vol > 0.8) { fill(255,0,0,100); rect(0,0,width,height); }
    }

    window.emergencyMute = () => { Tone.Destination.mute = !Tone.Destination.mute; };
    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
