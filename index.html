<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>VOID RIDER // TRACKING CAMERA FIXED</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.40/Tone.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    
    * { box-sizing: border-box; }

    html, body { 
      margin: 0; padding: 0; width: 100vw; height: 100vh; 
      background-color: #000; color: #0ff; 
      font-family: 'Share Tech Mono', monospace; 
      overflow: hidden; user-select: none;
    }

    #galaxy-bg {
      position: fixed; top: -20%; left: -20%; width: 140%; height: 140%; z-index: 1;
      background: url('https://res.cloudinary.com/dkni7ncod/image/upload/q_auto/f_auto/v1775955501/galaxy_n7qawo.jpg') center/cover no-repeat;
      opacity: 0.4; animation: galaxySpin 150s infinite linear; pointer-events: none;
    }
    @keyframes galaxySpin {
      0% { transform: scale(1.5) rotate(0deg); }
      100% { transform: scale(1.5) rotate(360deg); }
    }

    #ui-layer { 
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
      z-index: 100; pointer-events: none; 
    }

    #boot-screen {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0, 5, 15, 0.95); border: 2px solid #0ff; padding: 40px; 
      text-align: center; width: 600px; max-width: 90vw; box-shadow: 0 0 50px rgba(0, 255, 255, 0.4);
      border-radius: 5px; pointer-events: auto; transition: opacity 0.5s;
    }
    #boot-screen h1 { margin: 0 0 20px 0; font-size: 2.5rem; letter-spacing: 5px; border-bottom: 2px solid #0ff; padding-bottom: 10px; }
    
    .btn { padding: 15px 40px; font-size: 1.2rem; background: rgba(0, 255, 255, 0.1); color: #0ff; border: 1px solid #0ff; cursor: pointer; font-weight: bold; transition: 0.3s; border-radius: 3px;}
    .btn:hover:not(:disabled) { background: #0ff; color: #000; box-shadow: 0 0 30px #0ff; }
    .btn:disabled { opacity: 0.5; border-color: #555; color: #aaa; cursor: not-allowed; background: transparent; }

    #panic {
      position: absolute; top: 30px; right: 30px; display: none; pointer-events: auto;
      background: rgba(255, 0, 50, 0.2); color: #ff0032; border: 2px solid #ff0032;
      padding: 15px 30px; cursor: pointer; font-weight: bold; font-size: 1.2rem; transition: 0.2s; border-radius: 3px; letter-spacing: 2px;
    }
    #panic:hover { background: #ff0032; color: #000; box-shadow: 0 0 30px #ff0032; }

    .hotspot {
      position: absolute; display: none; pointer-events: auto; cursor: pointer;
      background: rgba(0, 255, 255, 0.05); border: 1px dashed rgba(0, 255, 255, 0.3);
      justify-content: center; align-items: center; text-align: center; color: rgba(0,255,255,0.4); font-size: 1.2rem; font-weight: bold; transition: 0.3s;
    }
    .hotspot:hover { background: rgba(0, 255, 255, 0.2); border: 1px solid #0ff; color: #0ff; text-shadow: 0 0 10px #0ff; }
    #hs-top { top: 20px; left: 50%; transform: translateX(-50%); width: 400px; height: 60px; }
    #hs-left { top: 10%; left: 20px; width: 80px; height: 80%; }
    #hs-right { top: 10%; right: 20px; width: 80px; height: 80%; }

    #dev-panel {
      position: absolute; bottom: 30px; left: 30px; display: none;
      background: rgba(0, 10, 25, 0.9); border: 1px solid #0ff; padding: 20px;
      flex-direction: column; gap: 15px; pointer-events: auto;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); border-radius: 5px; backdrop-filter: blur(5px);
    }
    #dev-panel h3 { margin: 0; font-size: 1rem; color: #fff; letter-spacing: 2px; }
    .slider-group { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 0.9rem;}
    input[type=range] { -webkit-appearance: none; width: 150px; background: transparent; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 8px; background: #0ff; cursor: pointer; margin-top: -6px; }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: rgba(0, 255, 255, 0.3); }

    .hud-text {
      position: absolute; display: none; top: 50%; transform: translateY(-50%);
      font-size: 1.1rem; line-height: 2; color: #0ff; text-shadow: 0 0 5px #0ff;
    }
    #telemetry-left { left: 40px; }
    #system-right { right: 40px; text-align: right; color: rgba(0, 255, 255, 0.7); font-size: 1rem;}

    #hud-bottom {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      display: none; flex-direction: column; align-items: center; gap: 10px; width: 500px; max-width: 80vw;
    }
    #vu-meter-bg { width: 100%; height: 15px; background: rgba(10, 20, 30, 0.8); border: 2px solid #0ff; border-radius: 2px; overflow: hidden; }
    #vu-meter-fill { width: 0%; height: 100%; background: #0ff; transition: width 0.1s, background 0.1s; }
    #hud-status { font-size: 1.1rem; font-weight: bold; letter-spacing: 2px; transition: color 0.2s;}

    .alert-state { background: rgba(255, 0, 50, 0.3) !important; box-shadow: inset 0 0 100px rgba(255,0,50,0.5); }

    #tutorial-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 5, 10, 0.95); border: 2px solid #0ff; box-shadow: 0 0 50px #0ff; padding: 40px; z-index: 9000; display: none; width: 500px; text-align: center; border-radius: 5px; pointer-events: auto; }
  </style>
</head>
<body>

  <div id="galaxy-bg"></div>

  <div id="ui-layer">
    <div id="boot-screen">
      <h1>VOID RIDER</h1>
      <p id="boot-status">Calibrazione Rete Neurale Facemesh in corso...</p>
      <button class="btn" id="action-btn" disabled>ATTENDERE...</button>
    </div>

    <div id="dev-panel">
      <h3>AUDIO SETUP</h3>
      <div class="slider-group">
        <label>GAIN MIC:</label>
        <input type="range" id="mic-gain" min="0" max="10" value="2" step="1">
        <span id="gain-val" style="width:40px;">+2dB</span>
      </div>
      <div class="slider-group">
        <label>NOISE GATE:</label>
        <input type="range" id="noise-gate" min="-60" max="-10" value="-30" step="1">
        <span id="gate-val" style="width:40px;">-30dB</span>
      </div>
    </div>

    <div id="telemetry-left" class="hud-text">
      <div id="txt-grav">> GRAVITÀ_X: +0.0 ST</div>
      <div id="txt-vocoder">> VOCODER_SYNTH: 0%</div>
      <div id="txt-jet">> JET_FLANGE: 0%</div>
    </div>

    <div id="system-right" class="hud-text">
      <div id="txt-mem">SYS.MEM: [0x8A7B2]</div>
      <div id="txt-route">ROUTE: [UNDEFINED]</div>
      <div id="txt-peak">MIC.PEAK: [-INF dB]</div>
      <div id="txt-link">LINK: [STABLE]</div>
    </div>

    <div id="hud-bottom">
      <div id="vu-meter-bg"><div id="vu-meter-fill"></div></div>
      <div id="hud-status">SISTEMA AUDIO PRIMARIO</div>
    </div>

    <button id="panic" onclick="window.emergencyMute()">⚠ TAGLIO MOTORI</button>
    
    <div id="hs-top" class="hotspot" onclick="showTutorial('UP')">[ FLANGER ]</div>
    <div id="hs-left" class="hotspot" onclick="showTutorial('LEFT')">[ VOCODER ]</div>
    <div id="hs-right" class="hotspot" onclick="showTutorial('RIGHT')">[ PITCH ]</div>

    <div id="tutorial-modal">
      <h2 id="tut-title" style="color:#0ff;">TITOLO</h2>
      <p id="tut-desc" style="color:#fff; font-size:1.2rem;">Descrizione...</p>
      <button class="btn" onclick="document.getElementById('tutorial-modal').style.display='none'">CHIUDI</button>
    </div>
  </div>

  <script>
    let videoReady = false;
    let audioReady = false;

    let video, facemesh, predictions = [];
    let preAmp, noiseGate, antiLarsenEQ, pitchShift, vocoderWah, vocoderBit, flanger, spaceDelay, spaceReverb, meter, analyzer;
    let cPitch = 0, cVocoder = 0, cFlange = 0, cSpace = 0;
    let stars = [];
    
    // DIMENSIONI OBLÒ OTTIMIZZATE (Compatte per non tagliare le sinapsi fluide)
    const HUD_W = 400;
    const HUD_H = 500;

    const silhouetteIndices = [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109];

    class Star {
      constructor() { this.x = random(-width, width); this.y = random(-height, height); this.z = random(width); this.pz = this.z; }
      update(speed) { this.z -= speed; if (this.z < 1) { this.z = width; this.x = random(-width, width); this.y = random(-height, height); this.pz = this.z; } }
      show() {
        let sx = map(this.x / this.z, 0, 1, 0, width); let sy = map(this.y / this.z, 0, 1, 0, height);
        let px = map(this.x / this.pz, 0, 1, 0, width); let py = map(this.y / this.pz, 0, 1, 0, height);
        this.pz = this.z;
        stroke(200, 255, 255, map(this.z, 0, width, 255, 0)); strokeWeight(map(this.z, 0, width, 3, 0)); line(px, py, sx, sy);
      }
    }

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight);
      canvas.style('position', 'fixed');
      canvas.style('top', '0');
      canvas.style('left', '0');
      canvas.style('z-index', '10'); 

      for (let i = 0; i < 300; i++) stars.push(new Star());

      video = createCapture(VIDEO, () => {
        video.size(640, 480);
        facemesh = ml5.facemesh(video, () => { 
          videoReady = true; 
          document.getElementById('boot-status').innerText = "Rete Neurale Pronta. In attesa di consenso Audio.";
          let btn = document.getElementById('action-btn'); btn.innerText = "ESTABLISH LINK"; btn.disabled = false;
        });
        facemesh.on("predict", r => predictions = r);
      });
      video.hide();
    }

    document.getElementById('mic-gain').addEventListener('input', (e) => {
      let val = e.target.value; document.getElementById('gain-val').innerText = '+' + val + 'dB';
      if(preAmp) preAmp.volume.rampTo(parseFloat(val), 0.1);
    });

    document.getElementById('noise-gate').addEventListener('input', (e) => {
      let val = e.target.value; document.getElementById('gate-val').innerText = val + 'dB';
      if(noiseGate) noiseGate.threshold = parseFloat(val);
    });

    document.getElementById('action-btn').addEventListener('click', async () => {
      try {
        await Tone.start();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false } });
        const mic = Tone.getContext().rawContext.createMediaStreamSource(stream);

        let gainVal = document.getElementById('mic-gain').value; let gateVal = document.getElementById('noise-gate').value;

        noiseGate = new Tone.Gate(parseFloat(gateVal), 0.1); preAmp = new Tone.Volume(parseFloat(gainVal)); antiLarsenEQ = new Tone.EQ3(0, 0, -15);
        meter = new Tone.Meter(); analyzer = new Tone.Waveform(256); 
        pitchShift = new Tone.PitchShift(0); pitchShift.windowSize = 0.05; pitchShift.wet.value = 0;
        
        vocoderBit = new Tone.BitCrusher(4); vocoderBit.wet.value = 0;
        vocoderWah = new Tone.AutoWah({ baseFrequency: 250, octaves: 4.5, sensitivity: 5, Q: 6, gain: 3, follower: { attack: 0.05, release: 0.3 } });
        vocoderWah.wet.value = 0;
        
        flanger = new Tone.Chorus({ frequency: 0.1, delayTime: 2.5, depth: 0.8, feedback: 0.85 }).start(); flanger.wet.value = 0; 
        spaceDelay = new Tone.FeedbackDelay("8n", 0.4); spaceDelay.wet.value = 0;
        spaceReverb = new Tone.Freeverb({ roomSize: 0.75, dampening: 2500 }); spaceReverb.wet.value = 0;
        let masterLimiter = new Tone.Limiter(-5); 

        Tone.connect(mic, noiseGate); noiseGate.connect(preAmp); preAmp.connect(antiLarsenEQ); antiLarsenEQ.connect(pitchShift); 
        pitchShift.chain(vocoderBit, vocoderWah, flanger, spaceDelay, spaceReverb, masterLimiter);
        masterLimiter.connect(analyzer); masterLimiter.connect(meter); masterLimiter.connect(Tone.Destination);

        audioReady = true;

        document.getElementById('boot-screen').style.opacity = '0'; setTimeout(() => document.getElementById('boot-screen').style.display = 'none', 500);
        document.getElementById('panic').style.display = 'block'; document.getElementById('dev-panel').style.display = 'flex';
        document.getElementById('telemetry-left').style.display = 'block'; document.getElementById('system-right').style.display = 'block';
        document.getElementById('hud-bottom').style.display = 'flex'; document.querySelectorAll('.hotspot').forEach(el => el.style.display = 'flex');
      } catch (err) { alert("Errore microfono: " + err.message); }
    });

    function draw() {
      clear(); 
      if (!videoReady || !audioReady) return;

      let db = meter.getValue(); let vol = map(db, -35, -5, 0, 1, true);
      aggiornaInterfacciaHTML(db, vol);

      if (predictions.length > 0) {
        let pts = predictions[0].scaledMesh;
        let nX = (pts[1][0] - video.width/2) / (video.width/2); 
        let nY = (pts[1][1] - video.height/2) / (video.height/2);

        // SENSORE LABBRA (Effetto Echo Space)
        let mDist = dist(pts[13][0], pts[13][1], pts[14][0], pts[14][1]);
        cSpace = lerp(cSpace, mDist > 8 ? map(mDist, 8, 25, 0, 1, true) : 0, 0.2);
        spaceDelay.wet.value = cSpace; spaceReverb.wet.value = cSpace;

        let tPitch = 0, tVocoder = 0, tFlange = 0;
        if (nX < -0.05) tPitch = map(nX, -0.05, -0.4, 0, 24, true); else if (nX > 0.15) tVocoder = map(nX, 0.15, 0.4, 0, 1, true); 
        if (nY < -0.05) tFlange = map(nY, -0.05, -0.4, 0, 1, true); 
        
        cPitch = lerp(cPitch, tPitch, 0.2); pitchShift.pitch = cPitch; pitchShift.wet.value = cPitch > 1 ? 1 : 0;
        cVocoder = lerp(cVocoder, tVocoder, 0.2); vocoderWah.wet.value = cVocoder; vocoderBit.wet.value = cVocoder; 
        cFlange = lerp(cFlange, tFlange, 0.2); flanger.wet.value = cFlange;
      }

      push(); translate(width/2, height/2);
      let warpSpeed = map(cFlange, 0, 1, 1, 80); for (let s of stars) { s.update(warpSpeed); s.show(); }
      pop();

      let wave = analyzer.getValue(); let cOsc = vol > 0.85 ? color(255, 0, 50) : color(0, 255, 255);
      push(); translate(width/2, 100); stroke(cOsc); strokeWeight(2); noFill();
      beginShape(); for (let i = 0; i < wave.length; i++) { vertex(map(i, 0, wave.length, -250, 250), wave[i] * 60); } endShape();
      fill(0, 255, 255, 10); noStroke(); ellipse(0, 0, 500, 40); pop();

      push();
      let shake = vol > 0.85 ? random(-15, 15) : 0;
      translate(width/2 + shake, height/2 + shake);

      // 1. FLUID SYNAPSES (Disegnate all'esterno dell'oblò)
      drawFluidSynapses();

      drawingContext.save();
      beginShape(); // FORMA HUD OTTANGONALE
      vertex(-HUD_W/2 + 30, -HUD_H/2); vertex(HUD_W/2 - 30, -HUD_H/2);
      vertex(HUD_W/2, -HUD_H/2 + 30); vertex(HUD_W/2, HUD_H/2 - 30);
      vertex(HUD_W/2 - 30, HUD_H/2); vertex(-HUD_W/2 + 30, HUD_H/2);
      vertex(-HUD_W/2, HUD_H/2 - 30); vertex(-HUD_W/2, -HUD_H/2 + 30);
      endShape(CLOSE);
      drawingContext.clip();

      // ==========================================
      // 2. SFONDO CABINA 
      // ==========================================
      drawCockpitBackground(cFlange);

      // ==========================================
      // 3. TRACKING CAMERA & FILTRO SCI-FI 
      // ==========================================
      // Fattore di zoom per inquadrare testa e spalle e dare spazio al movimento
      let scaleF = 1.6; 
      let pW = 640 * scaleF; 
      let pH = 480 * scaleF;
      
      let vidX = -pW/2;
      let vidY = -pH/2;

      // Se troviamo il volto, calcoliamo dove posizionare il video per tenere il naso al centro
      if (predictions.length > 0) {
        let pts = predictions[0].scaledMesh;
        let targetX = -(pts[1][0] * scaleF);
        // Sposta il naso leggermente verso l'alto per inquadrare le spalle
        let targetY = -(pts[1][1] * scaleF) - 20; 
        
        // IL SEGRETO: Constrain. Blocca il panning se il bordo del video entra nell'oblò,
        // così non vedi MAI lo spazio vuoto/nero ai lati.
        vidX = constrain(targetX, HUD_W/2 - pW, -HUD_W/2);
        vidY = constrain(targetY, HUD_H/2 - pH, -HUD_H/2);
      }

      push(); 
      scale(-1, 1); // Effetto Specchio

      // Render Video Base
      tint(0, 150, 255, 180); 
      image(video, vidX, vidY, pW, pH);

      // Aberrazione Cromatica
      let rO = map(cPitch, 0, 24, 0, 25);
      blendMode(SCREEN);
      tint(255, 0, 50, 100); image(video, vidX - rO, vidY, pW, pH);
      tint(0, 255, 255, 100); image(video, vidX + rO, vidY, pW, pH);
      blendMode(BLEND);
      tint(255, 255, 255, 255); // Reset tint fondamentale

      // --- MASCHERA DI PUNTI NEURALI ---
      if (predictions.length > 0) {
        let pts = predictions[0].scaledMesh;
        
        // I punti vengono disegnati in relazione a vidX e vidY, così rimangono
        // perfetamente incollati al tuo volto anche quando la telecamera smette di fare panning.
        stroke(0, 255, 255, 200);
        strokeWeight(2);
        beginShape(POINTS);
        for(let i=0; i<pts.length; i+=2) { 
          vertex(vidX + pts[i][0] * scaleF, vidY + pts[i][1] * scaleF);
        }
        endShape();

        noFill(); stroke(255, 0, 255, 180); strokeWeight(1.5);
        beginShape();
        for(let i of silhouetteIndices) {
          vertex(vidX + pts[i][0] * scaleF, vidY + pts[i][1] * scaleF);
        }
        endShape(CLOSE);
      }
      pop(); // Fine zona specchiata

      // Scanlines CRT per l'effetto HUD
      stroke(0, 255, 200, 15);
      strokeWeight(1);
      for(let i = -HUD_H/2; i < HUD_H/2; i+= 4) { line(-HUD_W/2, i, HUD_W/2, i); }

      // ==========================================
      // 4. PANNELLI CABINA SOVRAPPOSTI
      // ==========================================
      drawCockpitForeground(cPitch, cVocoder, vol);

      drawingContext.restore(); 

      // ==========================================
      // 5. OVERLAY CASCO E VETRO
      // ==========================================
      drawHelmetOverlay(HUD_W, HUD_H);
      pop();
    }

    // --- FUNZIONI DI DISEGNO MODULARI ---

    function drawCockpitBackground(flangeParam) {
      push();
      background(5, 10, 20, 180); 
      let horizon = 50; 
      let t = frameCount * (1 + flangeParam * 3); 
      
      noStroke(); fill(0, 255, 255, 30); ellipse(0, horizon, 200, 100); fill(0, 255, 255, 60); ellipse(0, horizon, 100, 50);

      strokeWeight(2); stroke(0, 255, 255, 60);
      for (let i = 0; i < 15; i++) {
        let y = horizon + pow(i + ((t*0.5)%20)/20, 2) * 2;
        if (y < HUD_H/2) line(-HUD_W/2, y, HUD_W/2, y);
      }
      for (let i = -10; i <= 10; i++) {
        let xBase = i * 30; let xBottom = i * 150; line(xBase, horizon, xBottom, HUD_H/2);
      }
      pop();
    }

    function drawCockpitForeground(pitchParam, vocoderParam, volParam) {
      push();
      // PANNELLO PITCH
      push(); translate(HUD_W/2 - 40, 0);
      stroke(0, 255, 255, 150); fill(0, 15, 30, 220); rect(-20, -120, 40, 240, 3);
      let pY = map(pitchParam, 0, 24, 110, -110);
      noStroke(); fill(0, 150, 255, 150); rect(-10, pY, 20, 110 - pY);
      stroke(0, 255, 255); strokeWeight(3); line(-15, pY, 15, pY);
      pop();

      // PANNELLO VOCODER
      push(); translate(-HUD_W/2 + 40, 0);
      stroke(0, 255, 255, 150); fill(0, 15, 30, 220); rect(-20, -120, 40, 240, 3);
      let vCol = lerpColor(color(0, 255, 255, 80), color(255, 0, 255, 220), vocoderParam);
      noStroke(); fill(vCol); 
      let pulse = sin(frameCount * 0.2) * 10 * vocoderParam;
      rect(-10 - pulse, -80 - pulse, 20 + pulse*2, 160 + pulse*2, 3);
      pop();

      // OVERLOAD FLASH
      if (volParam > 0.85) {
        fill(255, 0, 50, 150); noStroke();
        rect(-HUD_W/2, -HUD_H/2, HUD_W, 10); rect(-HUD_W/2, HUD_H/2 - 10, HUD_W, 10);
      }
      pop();
    }

    function drawHelmetOverlay(w, h) {
      push();
      stroke(0, 255, 255, 200); strokeWeight(4); noFill();
      beginShape();
      vertex(-w/2 + 30, -h/2); vertex(w/2 - 30, -h/2); vertex(w/2, -h/2 + 30); vertex(w/2, h/2 - 30);
      vertex(w/2 - 30, h/2); vertex(-w/2 + 30, h/2); vertex(-w/2, h/2 - 30); vertex(-w/2, -h/2 + 30);
      endShape(CLOSE);
      
      strokeWeight(1); fill(0, 255, 255, 40);
      rect(-w/2 + 40, -h/2 + 15, 30, 6); rect(w/2 - 70, -h/2 + 15, 30, 6);
      
      stroke(0, 255, 255, 80);
      line(-15, 0, 15, 0); line(0, -15, 0, 15); ellipse(0,0, 60,60);
      pop();
    }

    function drawFluidSynapses() {
      let baseCol = color(0, 255, 255, 40); strokeWeight(4); noFill();
      function streamFluid(endX, endY, intensity, activeColor) {
        stroke(intensity > 0.1 ? activeColor : baseCol);
        let floatOffset = sin(frameCount * 0.05 + endX) * 30;
        let cX1 = endX * 0.3; let cY1 = endY * 0.8 + floatOffset; let cX2 = endX * 0.7; let cY2 = endY * 0.2 + floatOffset;
        bezier(0, 0, cX1, cY1, cX2, cY2, endX, endY);
        if (intensity > 0.1) {
          let t = (frameCount * 0.03 * (1 + intensity*2)) % 1; let px = bezierPoint(0, cX1, cX2, endX, t); let py = bezierPoint(0, cY1, cY2, endY, t);
          noStroke(); fill(activeColor); ellipse(px, py, 15 + intensity*10, 15 + intensity*10); fill(255); ellipse(px, py, 6, 6); noFill();
        }
      }
      streamFluid(0, -height/2 + 50, cFlange, color(255, 200, 0)); 
      streamFluid(-width/2 + 100, 0, cVocoder, color(255, 0, 255)); 
      streamFluid(width/2 - 100, 0, cPitch/24, color(0, 150, 255)); 
    }

    function aggiornaInterfacciaHTML(db, vol) {
      document.getElementById('txt-grav').innerText = `> GRAVITÀ_X: +${cPitch.toFixed(1)} ST`;
      document.getElementById('txt-vocoder').innerText = `> VOCODER_SYNTH: ${(cVocoder*100).toFixed(0)}%`;
      document.getElementById('txt-jet').innerText = `> JET_FLANGE: ${(cFlange*100).toFixed(0)}%`;
      let peakText = (db === -Infinity) ? "-INF" : db.toFixed(1); document.getElementById('txt-peak').innerText = `MIC.PEAK: [${peakText} dB]`;

      let vuFill = document.getElementById('vu-meter-fill'); let statusText = document.getElementById('hud-status');
      if (vol > 0.85) {
        vuFill.style.width = (vol * 100) + '%'; vuFill.style.background = '#ff0032'; statusText.style.color = '#ff0032';
        statusText.innerText = (frameCount % 10 < 5) ? "⚠ INTEGRITÀ CRITICA ⚠" : "OVERLOAD"; document.body.classList.add('alert-state');
      } else {
        vuFill.style.width = (vol * 100) + '%'; vuFill.style.background = '#0ff'; statusText.style.color = '#0ff';
        statusText.innerText = "SISTEMA AUDIO PRIMARIO"; document.body.classList.remove('alert-state');
      }
    }

    window.showTutorial = function(type) {
      const m = document.getElementById('tutorial-modal'); const t = document.getElementById('tut-title'); const d = document.getElementById('tut-desc');
      if(type==='LEFT') { t.innerText="VOCODER SYNTH"; d.innerText="Sposta la testa a SINISTRA. Attiva il tracciamento dei formanti e la sintesi vocale."; }
      if(type==='RIGHT'){ t.innerText="PITCH UP"; d.innerText="Sposta la testa a DESTRA. Elimina la gravità vocale."; }
      if(type==='UP')   { t.innerText="WARP FLANGER"; d.innerText="Guarda in ALTO. Innesca il reattore al plasma."; }
      m.style.display = 'block';
    }

    window.emergencyMute = () => { 
      Tone.Destination.mute = !Tone.Destination.mute; let btn = document.getElementById('panic');
      btn.innerText = Tone.Destination.mute ? "⚠ SBLOCCA MOTORI" : "⚠ TAGLIO MOTORI"; 
      if(Tone.Destination.mute) btn.style.background = "#ff0032"; else btn.style.background = "rgba(255, 0, 50, 0.2)";
    };

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
