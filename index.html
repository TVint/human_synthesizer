<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>VOID RIDER // TACTICAL HUD</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.40/Tone.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    body { 
      margin: 0; padding: 0; background-color: #020205; color: #00ffff; 
      font-family: 'Share Tech Mono', monospace; overflow: hidden;
    }
    
    #ui-container {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(2, 5, 10, 0.9); border: 1px solid #00ffff; 
      padding: 40px; text-align: center; z-index: 200; width: 550px;
      backdrop-filter: blur(5px);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2), inset 0 0 20px rgba(0, 255, 255, 0.1);
      clip-path: polygon(0 15px, 15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
    }
    
    h1 { 
      margin-top: 0; font-size: 2.5rem; letter-spacing: 5px; color: #00ffff; 
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.5); border-bottom: 1px solid #00ffff; padding-bottom: 10px;
    }
    
    #status-msg { 
      margin: 20px 0; color: #88ccaa; font-size: 1rem; line-height: 1.6; min-height: 60px;
    }
    
    .btn {
      display: inline-block; padding: 15px 40px; margin-top: 15px; font-size: 1.2rem;
      background: rgba(0, 255, 255, 0.1); color: #00ffff; border: 1px solid #00ffff;
      cursor: pointer; text-transform: uppercase; font-weight: bold; 
      letter-spacing: 2px; transition: all 0.2s; position: relative; z-index: 1000;
    }
    .btn:hover { background: #00ffff; color: #000; box-shadow: 0 0 15px #00ffff; }

    #panic {
      position: absolute; top: 20px; right: 20px; z-index: 300; display: none;
      background: rgba(255, 0, 51, 0.1); color: #ff0033; border: 1px solid #ff0033;
      padding: 10px 20px; font-size: 1rem; cursor: pointer; text-transform: uppercase;
    }
    #panic:hover { background: #ff0033; color: #000; box-shadow: 0 0 15px #ff0033;}
  </style>
</head>
<body>

  <div id="ui-container">
    <h1>VOID RIDER // SYS.BOOT</h1>
    <div id="status-msg">
      <b>SISTEMA HUD TATTICO PRONTO</b><br><br>
      Assegnazione sensori biometrici ai parametri di volo audio.<br>
      > Bocca = Riverbero Spaziale<br>
      > Testa Dx/Sx = Pitch Shift (Gravità)<br>
      > Testa Su = Flanger (Propulsori)<br>
      <span style="color:#ff0033">> WARNING: Rischio Larsen. Monitorare il VU-Meter.</span>
    </div>
    <button class="btn" id="action-btn">INIZIALIZZA LINK</button>
  </div>

  <button id="panic" onclick="window.emergencyMute()">TAGLIO MOTORI</button>

  <script>
    let video, facemesh, predictions = [];
    let pitchShift, flanger, spaceDelay, spaceReverb, limiter, meter;
    
    let curPitch = 0, curSpace = 0, curFlanger = 0;
    let headOffsetX = 0, headOffsetY = 0; // Vettori di mira
    let isMuted = false, isRunning = false;

    // --- SETUP P5.JS ---
    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight);
      canvas.position(0, 0);
      canvas.style('z-index', '-1');
      canvas.style('pointer-events', 'none'); 
    }

    // --- BINDING DEL PULSANTE ---
    document.getElementById('action-btn').addEventListener('click', async () => {
      const msg = document.getElementById('status-msg');
      const btn = document.getElementById('action-btn');
      
      btn.style.display = 'none';
      msg.innerHTML = "<span style='color:#00ffff;'>ATTESA PERMESSI HARDWARE...</span><br>Controlla il popup del browser.";
      
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, 
          video: true 
        });
        
        msg.innerHTML = "CALIBRAZIONE MOTORE AUDIO...";
        await Tone.start();
        
        const audioContext = Tone.getContext().rawContext;
        const micSource = audioContext.createMediaStreamSource(stream);
        
        // --- MOTORE AUDIO SPAZIALE CORRETTO ---
        pitchShift = new Tone.PitchShift(0);
        pitchShift.windowSize = 0.04;

        flanger = new Tone.Chorus({
          frequency: 10,
          delayTime: 4,
          depth: 1,
          feedback: 0.9, // <--- Questo crea il fischio metallico
          type: "sine"
        }).start();
        flanger.wet.value = 0;

        spaceDelay = new Tone.FeedbackDelay("8n", 0.6);
        spaceDelay.wet.value = 0;
        
        spaceReverb = new Tone.Freeverb({ roomSize: 0.9, dampening: 2000 });
        spaceReverb.wet.value = 0;

        limiter = new Tone.Limiter(-2); 
        meter = new Tone.Meter(); 

        Tone.connect(micSource, pitchShift);
        Tone.connect(micSource, meter);
        
        pitchShift.chain(flanger, spaceDelay, spaceReverb, limiter, Tone.Destination);

        msg.innerHTML = "CARICAMENTO RETE NEURALE FACIALE...";

        video = createCapture(VIDEO, () => {
          facemesh = ml5.facemesh(video, () => {
            isRunning = true;
            document.getElementById('ui-container').style.display = 'none';
            document.getElementById('panic').style.display = 'block';
          });
          facemesh.on("predict", results => { predictions = results; });
        });
        video.hide();

      } catch (e) {
        msg.innerHTML = "<span style='color:#ff0033;'>ERRORE SISTEMA:</span> " + e.message;
        btn.style.display = 'inline-block'; 
        btn.innerText = "RIPROVA";
      }
    });

    window.emergencyMute = function() {
      isMuted = !isMuted;
      Tone.Destination.mute = isMuted;
      document.getElementById('panic').innerText = isMuted ? "SBLOCCA MOTORI" : "TAGLIO MOTORI";
    }

    // --- MOTORE GRAFICO AVANZATO ---
    function draw() {
      background(5, 8, 12);
      if (!isRunning) return;

      let db = meter ? meter.getValue() : -100;
      let isCritical = db > -8; 

      push();
      // Mettiamo il video al centro
      translate(width, 0); scale(-1, 1);
      
      let shake = isCritical ? random(-15, 15) : 0;
      translate(width/2 - video.width/2 + shake, height/2 - video.height/2 + shake);
      
      let rgbOffset = map(Math.abs(curPitch), 0, 24, 0, 30);
      
      // Filtro Video / RGB Split
      blendMode(SCREEN);
      tint(255, 0, 50, 120); image(video, -rgbOffset, 0);
      tint(0, 255, 255, 120); image(video, rgbOffset, 0);
      tint(255, 255, 255, 160); image(video, 0, 0);
      blendMode(BLEND);

      if (predictions.length > 0) {
        processMocap();
        drawFaceTracking(isCritical);
      }
      pop();

      // Sovrapposizioni HUD Tattico (Sopra il video)
      drawTacticalHUD(db, isCritical);
    }

    // --- LOGICA DI NAVIGAZIONE E SUONO CORRETTA ---
    function processMocap() {
      const pts = predictions[0].scaledMesh;
      const nose = pts[1];
      const topLip = pts[13], bottomLip = pts[14];

      // BOCCA = Delay & Reverb (Attivazione reattiva)
      let mouthDist = dist(topLip[0], topLip[1], bottomLip[0], bottomLip[1]);
      let targetSpace = mouthDist > 8 ? map(mouthDist, 8, 30, 0, 1, true) : 0;
      curSpace = lerp(curSpace, targetSpace, 0.15);
      spaceDelay.wet.value = curSpace;
      spaceReverb.wet.value = curSpace;

      // CALCOLO VETTORI TESTA (Corretti per lo specchio)
      // Se sposti la testa alla TUA DESTRA, il naso sul video non specchiato va a sinistra (< width/2)
      // Quindi offsetX diventa positivo.
      headOffsetX = (video.width / 2) - nose[0]; 
      
      // Se sposti la testa in ALTO, il naso va verso lo 0 (< height/2)
      // Quindi offsetY diventa positivo.
      headOffsetY = (video.height / 2) - nose[1];

      // ASSE X = Pitch Shift 
      // Destra (offsetX > 0) -> Pitch Positivo. Sinistra (offsetX < 0) -> Pitch Negativo
      let targetPitch = 0;
      if (Math.abs(headOffsetX) > 20) {
        targetPitch = map(headOffsetX, -150, 150, -24, 24, true); 
      }
      curPitch = lerp(curPitch, targetPitch, 0.1);
      pitchShift.pitch = curPitch;

      // ASSE Y = Flanger (Solo quando si guarda in ALTO)
      let targetFlanger = headOffsetY > 10 ? map(headOffsetY, 10, 120, 0, 1, true) : 0;
      curFlanger = lerp(curFlanger, targetFlanger, 0.2); 
      flanger.wet.value = curFlanger;
      }

    // --- DISEGNO MASCHERA ---
    function drawFaceTracking(isCritical) {
      const pts = predictions[0].scaledMesh;
      const nose = pts[1];

      // Punti del viso
      stroke(isCritical ? 255 : 0, isCritical ? 0 : 255, isCritical ? 50 : 255, 80);
      strokeWeight(2);
      noFill();
      beginShape(POINTS);
      for (let j = 0; j < pts.length; j+=2) { point(pts[j][0], pts[j][1]); }
      endShape();

      // Mirino Vettoriale sul Naso
      stroke(255); strokeWeight(1);
      line(nose[0] - 20, nose[1], nose[0] + 20, nose[1]);
      line(nose[0], nose[1] - 20, nose[0], nose[1] + 20);
      noFill();
      ellipse(nose[0], nose[1], 30, 30);

      // Particelle Bocca
      if (curSpace > 0.1) {
        let topL = pts[13], botL = pts[14];
        let cX = (topL[0]+botL[0])/2, cY = (topL[1]+botL[1])/2;
        noStroke();
        let glow = map(curSpace, 0, 1, 10, 120);
        fill(0, 255, 255, 40); ellipse(cX, cY, glow, glow);
        fill(255, 255, 255, 60); ellipse(cX, cY, glow/2, glow/2);
      }
    }

    // --- DISEGNO HUD CYBERPUNK ---
    function drawTacticalHUD(db, isCritical) {
      let c = color(0, 255, 255);
      if (isCritical) c = color(255, 0, 50);

      // 1. SCANLINES FISSE
      stroke(c.levels[0], c.levels[1], c.levels[2], 20);
      strokeWeight(1);
      for(let i = 0; i < height; i += 6) { line(0, i, width, i); }

      // 2. CORNICI RETICOLARI
      stroke(c); noFill(); strokeWeight(2);
      // Angoli
      let d = 40;
      line(20, 20, 20+d, 20); line(20, 20, 20, 20+d);
      line(width-20, 20, width-20-d, 20); line(width-20, 20, width-20, 20+d);
      line(20, height-20, 20+d, height-20); line(20, height-20, 20, height-20-d);
      line(width-20, height-20, width-20-d, height-20); line(width-20, height-20, width-20, height-20-d);

      // 3. RADAR CIRCOLARE (Top Left)
      push();
      translate(100, 100);
      stroke(c.levels[0], c.levels[1], c.levels[2], 100);
      ellipse(0, 0, 100, 100);
      ellipse(0, 0, 50, 50);
      line(-60, 0, 60, 0); line(0, -60, 0, 60);
      // Punto mobile del Radar (Testa X, Y)
      let rx = map(headOffsetX, -150, 150, -50, 50, true);
      let ry = map(headOffsetY, -150, 150, 50, -50, true);
      fill(c); noStroke();
      ellipse(rx, ry, 6, 6);
      pop();

      // 4. TESTI LATERALI E DATI RAW
      fill(c); noStroke(); textAlign(LEFT, TOP);
      textSize(12);
      text("SYS.VER: 4.8.9\nLINK: STABLE\nLATENCY: " + Math.floor(random(12, 18)) + "ms", 20, 170);
      
      textAlign(RIGHT, TOP);
      text("PITCH: " + curPitch.toFixed(2) + " st\nJET FLANGER: " + (curFlanger*100).toFixed(0) + "%\nSPACE RNG: " + (curSpace*100).toFixed(0) + "%", width-20, 100);

      // 5. LARSEN VU METER (Bottom)
      let rW = 400; let rH = 20;
      let x = width/2 - rW/2; let y = height - 60;
      
      fill(20, 20, 30, 200); stroke(c); strokeWeight(1);
      rect(x, y, rW, rH);
      
      let fillW = map(db, -40, 0, 0, rW, true);
      noStroke(); fill(c);
      if (isCritical) fill(255, 0, 50);
      rect(x, y, fillW, rH);

      // Griglia sopra il VU Meter
      stroke(0); strokeWeight(2);
      for(let i = x; i < x + rW; i += 20) { line(i, y, i, y + rH); }

      textAlign(CENTER, BOTTOM); textSize(16);
      if (isCritical && frameCount % 6 < 3) {
        text("LARSEN EFFECT ALERT // INTEGRITY CRITICAL", width/2, y - 10);
      } else {
        text("LARSEN MONITORING SYSTEM", width/2, y - 10);
      }

      // 6. REDOUT FLASH (Se in Larsen)
      if (isCritical) {
        fill(255, 0, 50, random(40, 100)); rect(0, 0, width, height);
      }
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
