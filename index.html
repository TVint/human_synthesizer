<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>VOID RIDER // DEV EDITION (OVERDRIVE)</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.40/Tone.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    
    body { 
      margin: 0; padding: 0; background-color: #000; color: #0ff; 
      font-family: 'Share Tech Mono', monospace; overflow: hidden; 
    }

    #galaxy-bg {
      position: absolute; top: -10%; left: -10%; width: 120%; height: 120%; z-index: 1;
      background: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=2048&auto=format&fit=crop') center/cover no-repeat;
      opacity: 0.6; animation: galaxyDrift 60s infinite alternate linear; pointer-events: none;
    }
    @keyframes galaxyDrift {
      0% { transform: scale(1) rotate(0deg); }
      100% { transform: scale(1.1) rotate(2deg); }
    }

    #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; }

    #boot-screen {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0, 5, 15, 0.9); border: 2px solid #0ff; padding: 40px; 
      text-align: center; width: 600px; box-shadow: 0 0 50px rgba(0, 255, 255, 0.4);
      pointer-events: auto;
    }
    h1 { margin: 0 0 20px 0; font-size: 2.5rem; letter-spacing: 5px; border-bottom: 2px solid #0ff; padding-bottom: 10px; }
    .btn { padding: 15px 40px; font-size: 1.2rem; background: rgba(0, 255, 255, 0.1); color: #0ff; border: 1px solid #0ff; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .btn:hover { background: #0ff; color: #000; box-shadow: 0 0 30px #0ff; }

    #panic {
      position: absolute; top: 30px; right: 30px; display: none; pointer-events: auto;
      background: rgba(255, 0, 50, 0.2); color: #ff0032; border: 2px solid #ff0032;
      padding: 15px 30px; cursor: pointer; font-weight: bold; font-size: 1.2rem; transition: 0.2s;
    }

    .hotspot {
      position: absolute; display: none; pointer-events: auto; cursor: pointer;
      background: rgba(0, 255, 255, 0.05); border: 1px dashed rgba(0, 255, 255, 0.5);
      justify-content: center; align-items: center; color: rgba(0,255,255,0.8); font-weight: bold; font-size: 1.2rem; transition: 0.3s;
    }
    .hotspot:hover { background: rgba(0, 255, 255, 0.3); text-shadow: 0 0 10px #0ff; }
    
    #hs-top { top: 20px; left: 20%; width: 60%; height: 60px; }
    #hs-bottom { bottom: 20px; left: 20%; width: 60%; height: 60px; }
    #hs-left { top: 10%; left: 20px; width: 80px; height: 80%; }
    #hs-right { top: 10%; right: 20px; width: 80px; height: 80%; }

    #tutorial-modal {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0, 5, 10, 0.95); border: 2px solid #0ff; box-shadow: 0 0 50px #0ff;
      padding: 40px; display: none; width: 500px; text-align: center; pointer-events: auto;
    }
  </style>
</head>
<body>

  <div id="galaxy-bg"></div>

  <div id="ui-layer">
    <div id="boot-screen">
      <h1>VOID RIDER // DEV</h1>
      <p>Design Mode Ready. LIMITATORI AUDIO RIMOSSI (+12dB Pre-Amp).</p>
      <button class="btn" id="action-btn">INIZIALIZZA SISTEMA</button>
    </div>

    <div id="hs-top" class="hotspot" onclick="showTutorial('UP')">FLANGER</div>
    <div id="hs-bottom" class="hotspot" onclick="showTutorial('DOWN')">BITCRUSH</div>
    <div id="hs-left" class="hotspot" onclick="showTutorial('LEFT')">ALIEN</div>
    <div id="hs-right" class="hotspot" onclick="showTutorial('RIGHT')">PITCH UP</div>
    
    <button id="panic" onclick="window.emergencyMute()">⚠ TAGLIO MOTORI</button>

    <div id="tutorial-modal">
      <h2 id="tut-title" style="color:#0ff;">TITOLO</h2>
      <p id="tut-desc" style="color:#fff;">Descrizione...</p>
      <button class="btn" onclick="document.getElementById('tutorial-modal').style.display='none'">CHIUDI</button>
    </div>
  </div>

  <script>
    let video, facemesh, predictions = [];
    let preAmp, noiseGate, eq, pitchShift, ringMod, chebyshev, flangerEffect, bitcrusher, spaceDelay, spaceReverb, meter, analyzer;
    let cPitch = 0, cRing = 0, cFlange = 0, cBit = 0, cSpace = 0;
    let isRunning = false;
    let customHelmetImg; 

    const silhouetteIndices = [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109];

    function preload() {
      customHelmetImg = loadImage('data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'); 
    }

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight);
      canvas.position(0, 0); 
      canvas.style('z-index', '10'); 
    }

    document.getElementById('action-btn').addEventListener('click', async () => {
      document.getElementById('boot-screen').style.display = 'none';
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false }, video: true });
        await Tone.start();
        const mic = Tone.getContext().rawContext.createMediaStreamSource(stream);

        // --- MOTORE AUDIO: OVERDRIVE ---
        preAmp = new Tone.Volume(12); // IL SEGRETO: Boostiamo l'audio in ingresso di 12 decibel (enorme!)
        noiseGate = new Tone.Gate(-55, 0.1); // Abbassato il gate per catturare suoni più deboli
        eq = new Tone.EQ3(0, 0, -5); 
        analyzer = new Tone.Waveform(256); 
        meter = new Tone.Meter();

        pitchShift = new Tone.PitchShift(0); pitchShift.windowSize = 0.05; pitchShift.wet.value = 0; 
        ringMod = new Tone.FrequencyShifter(600); ringMod.wet.value = 0; // Ancora più acuto
        chebyshev = new Tone.Chebyshev(100); chebyshev.wet.value = 0; // Più distorsione
        flangerEffect = new Tone.Chorus({ frequency: 0.15, delayTime: 1.5, depth: 1, feedback: 0.98 }).start(); flangerEffect.wet.value = 0; 
        bitcrusher = new Tone.BitCrusher(1.5); bitcrusher.wet.value = 0; // Distruzione quasi totale
        spaceDelay = new Tone.FeedbackDelay("8n", 0.7); spaceDelay.wet.value = 0;
        spaceReverb = new Tone.Freeverb({ roomSize: 0.98, dampening: 1000 }); spaceReverb.wet.value = 0;

        // Limiter di sicurezza a 0dB (volume massimo puro, senza riduzioni di Volume a -10 come prima)
        let masterLimiter = new Tone.Limiter(0);

        // Routing esplosivo
        Tone.connect(mic, preAmp);
        preAmp.connect(noiseGate);
        noiseGate.chain(eq, analyzer, meter, pitchShift);
        pitchShift.chain(ringMod, bitcrusher, chebyshev, flangerEffect, spaceDelay, spaceReverb, masterLimiter, Tone.Destination);

        video = createCapture(VIDEO, () => {
          facemesh = ml5.facemesh(video, () => {
            isRunning = true;
            document.getElementById('panic').style.display = 'block';
            document.querySelectorAll('.hotspot').forEach(el => el.style.display = 'flex');
          });
          facemesh.on("predict", r => predictions = r);
        });
        video.hide();
      } catch (e) { alert("Errore: " + e.message); }
    });

    window.showTutorial = function(type) {
      const m = document.getElementById('tutorial-modal'); const t = document.getElementById('tut-title'); const d = document.getElementById('tut-desc');
      if(type==='LEFT'){ t.innerText="MODULATORE AD ANELLO"; d.innerText="Spostati a SINISTRA. Crea frequenze aliene estreme."; } 
      if(type==='RIGHT'){ t.innerText="PITCH UP"; d.innerText="Spostati a DESTRA. Alza la voce a livelli disumani."; } 
      if(type==='UP'){ t.innerText="FLANGER PROPULSORI"; d.innerText="Guarda in ALTO. Turbina Jet con feedback al limite del Larsen."; } 
      if(type==='DOWN'){ t.innerText="BITCRUSHER GLITCH"; d.innerText="Guarda in BASSO. Annienta il segnale a 1.5-bit."; }
      m.style.display = 'block';
    }

    function draw() {
      clear(); 
      if (!isRunning) return;

      let vol = map(meter.getValue(), -25, -2, 0, 1, true);

      if (predictions.length > 0) {
        let pts = predictions[0].scaledMesh;
        let nX = (pts[1][0] - video.width/2) / (video.width/2); 
        let nY = (pts[1][1] - video.height/2) / (video.height/2);

        // Bocca (Reattività estrema)
        let mDist = dist(pts[13][0], pts[13][1], pts[14][0], pts[14][1]);
        cSpace = lerp(cSpace, mDist > 8 ? map(mDist, 8, 25, 0, 1, true) : 0, 0.3);
        spaceDelay.wet.value = cSpace; spaceReverb.wet.value = cSpace;

        // X/Y
        let tPitch = 0, tRing = 0;
        if (nX < -0.05) tPitch = map(nX, -0.05, -0.4, 0, 24, true); 
        else if (nX > 0.05) tRing = map(nX, 0.05, 0.4, 0, 1, true);
        
        cPitch = lerp(cPitch, tPitch, 0.3); pitchShift.pitch = cPitch; pitchShift.wet.value = cPitch > 1 ? 1 : 0;
        cRing = lerp(cRing, tRing, 0.3); ringMod.wet.value = cRing;

        let tFlange = 0, tBit = 0;
        if (nY < -0.05) tFlange = map(nY, -0.05, -0.4, 0, 1, true);
        else if (nY > 0.05) tBit = map(nY, 0.05, 0.4, 0, 1, true);
        
        cFlange = lerp(cFlange, tFlange, 0.3); chebyshev.wet.value = cFlange; flangerEffect.wet.value = cFlange;
        cBit = lerp(cBit, tBit, 0.3); bitcrusher.wet.value = cBit;
      }

      push();
      let wobbleX = sin(frameCount * 0.5) * cRing * 40; 
      let wobbleY = cos(frameCount * 0.4) * cRing * 40;
      let shake = vol > 0.85 ? random(-30, 30) : 0;
      
      translate(width/2 + shake + wobbleX, height/2 + shake + wobbleY);
      
      if (predictions.length > 0) {
        let pts = predictions[0].scaledMesh;
        
        drawingContext.save(); 
        beginShape();
        vertex(-(pts[10][0] - video.width/2), pts[10][1] - video.height/2 - 80); 
        for (let i of silhouetteIndices) { vertex(-(pts[i][0] - video.width/2), pts[i][1] - video.height/2); }
        endShape(CLOSE);
        drawingContext.clip(); 

        push(); scale(-1, 1); 
        if (cBit > 0.2) { filter(POSTERIZE, 3); }

        let rO = map(cPitch, 0, 24, 0, 60);
        blendMode(SCREEN);
        tint(255, 0, 50, 200); image(video, -video.width/2 - rO, -video.height/2);
        tint(0, 255, 255, 200); image(video, -video.width/2 + rO, -video.height/2);
        tint(255, 255, 255, 220); image(video, -video.width/2, -video.height/2);
        blendMode(BLEND);
        pop();
        drawingContext.restore(); 

        push();
        let faceCX = (pts[1][0] - video.width/2); 
        let faceCY = (pts[1][1] - video.height/2);
        let faceW = dist(pts[234][0], pts[234][1], pts[454][0], pts[454][1]);
        translate(-faceCX, faceCY); 
        imageMode(CENTER);
        image(customHelmetImg, 0, 0, faceW * 2.5, faceW * 2.5);
        pop();
      }
      pop();

      drawCockpitHUD(meter.getValue(), vol);
    }

    function drawCockpitHUD(db, vol) {
      let c = vol > 0.85 ? color(255, 0, 50) : color(0, 255, 255);
      
      let wave = analyzer.getValue();
      push(); translate(width/2, 100); stroke(c); strokeWeight(3); noFill();
      beginShape(); for (let i = 0; i < wave.length; i++) { vertex(map(i, 0, wave.length, -300, 300), wave[i] * 80); } endShape();
      pop();

      let rX = width/2 - 250, rY = height - 80;
      fill(10, 20, 40, 200); stroke(c); strokeWeight(2); rect(rX, rY, 500, 20);
      noStroke(); fill(c); rect(rX, rY, map(vol, 0, 1, 0, 500, true), 20);
      if (vol > 0.85) { fill(255, 0, 50, random(50, 100)); rect(0, 0, width, height); }

      stroke(c); noFill(); strokeWeight(4);
      line(30, 80, 30, 30); line(30, 30, 80, 30); line(width-80, 30, width-30, 30); line(width-30, 30, width-30, 80); 
      line(30, height-80, 30, height-30); line(30, height-30, 80, height-30); line(width-80, height-30, width-30, height-30); line(width-30, height-30, width-30, height-80); 
    }

    window.emergencyMute = () => { Tone.Destination.mute = !Tone.Destination.mute; document.getElementById('panic').innerText = Tone.Destination.mute ? "⚠ SBLOCCA" : "⚠ TAGLIO MOTORI"; };
    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
