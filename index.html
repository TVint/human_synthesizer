<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>GLITCH // FEEDBACK LOOP PRO</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.40/Tone.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');

    body { 
      margin: 0; padding: 0; background-color: #050505; color: #ff2a5f; 
      font-family: 'Rajdhani', sans-serif; overflow: hidden; 
    }
    
    #ui-container {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(15, 5, 10, 0.7); border: 1px solid rgba(255, 42, 95, 0.3); 
      padding: 50px; text-align: center; z-index: 200; width: 450px;
      backdrop-filter: blur(12px); border-radius: 15px;
      box-shadow: 0 0 40px rgba(255, 42, 95, 0.15), inset 0 0 20px rgba(255, 42, 95, 0.05);
    }
    
    h1 { 
      margin-top: 0; font-size: 3rem; letter-spacing: 6px; color: #ff2a5f; 
      text-shadow: 0 0 10px rgba(255, 42, 95, 0.8), 2px 2px 0px #00ffff; 
      margin-bottom: 10px;
    }
    
    #status-msg { 
      margin: 20px 0; color: #e0e0e0; font-size: 1.2rem; line-height: 1.6; 
      min-height: 60px; font-weight: 500;
    }
    
    .btn {
      display: inline-block; padding: 18px 45px; margin-top: 15px; font-size: 1.4rem;
      background: linear-gradient(45deg, #ff2a5f, #ff0033); color: #fff; 
      border: none; cursor: pointer; text-transform: uppercase; font-weight: 700; 
      border-radius: 8px; letter-spacing: 2px; transition: all 0.2s ease;
      box-shadow: 0 5px 15px rgba(255, 42, 95, 0.4);
    }
    .btn:hover { 
      transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 42, 95, 0.6); 
      background: linear-gradient(45deg, #ff0033, #ff2a5f);
    }
    .btn:active { transform: translateY(2px); box-shadow: 0 2px 10px rgba(255, 42, 95, 0.4); }

    #hud {
      position: absolute; top: 30px; left: 30px; z-index: 100; display: none;
      background: rgba(10, 5, 5, 0.6); padding: 25px; border-left: 4px solid #00ffff;
      backdrop-filter: blur(8px); border-radius: 0 10px 10px 0;
    }
    .hud-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 15px; color: #00ffff; letter-spacing: 2px;}
    .hud-row { margin-bottom: 10px; font-size: 1.2rem; color: #ccc;}
    .hud-val { color: #fff; font-weight: 700; font-family: monospace; font-size: 1.3rem;}
    
    #panic {
      position: absolute; bottom: 30px; right: 30px; z-index: 300; display: none;
      background: transparent; color: #ff2a5f; border: 2px solid #ff2a5f;
      padding: 15px 30px; font-size: 1.2rem; cursor: pointer; font-weight: 700;
      border-radius: 8px; transition: 0.3s; font-family: 'Rajdhani', sans-serif;
    }
    #panic:hover { background: #ff2a5f; color: #000; }
    
    .glitch-active { border-left-color: #ff2a5f !important; box-shadow: -10px 0 20px rgba(255,42,95,0.4); }
  </style>
</head>
<body>

  <div id="ui-container">
    <h1>SYS.ERROR</h1>
    <div id="status-msg">
      <span style="color: #ff2a5f;"><b>ATTENZIONE:</b></span> Il volume verrà settato al 50% in modalità sicurezza.<br><br>
      Cliccando il pulsante autorizzi l'attivazione dei sensori (A/V).
    </div>
    <button class="btn" id="action-btn" onclick="window.igniteSystem()">IGNITE SYSTEM</button>
  </div>

  <div id="hud">
    <div class="hud-title">DIAGNOSTICA ATTIVA</div>
    <div class="hud-row">RAW IN: <span id="val-db" class="hud-val">-∞</span> dB</div>
    <div class="hud-row">FEEDBACK (Bocca): <span id="val-delay" class="hud-val">0</span>%</div>
    <div class="hud-row">MUTATION (Testa X): <span id="val-pitch" class="hud-val">0</span> semi</div>
    <div class="hud-row">CHORUS/FL (Testa Y): <span id="val-flanger" class="hud-val">0</span>%</div>
    <div id="warning" style="color: #ff2a5f; margin-top: 15px; font-weight: bold; font-size: 1.2rem; display: none; text-shadow: 0 0 10px #ff2a5f;">⚠ CRITICAL LOOP DETECTED</div>
  </div>

  <button id="panic" onclick="window.emergencyMute()">EMERGENCY STOP (MUTE)</button>

  <script>
    let video, facemesh, predictions = [];
    let preAmp, pitchShift, flanger, feedbackDelay, limiter, meter, masterVol;
    
    let curPitch = 0, curDelay = 0, curFlanger = 0;
    let isMuted = false;
    let isRunning = false;

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight);
      canvas.position(0, 0);
      canvas.style('z-index', '-1');
    }

    window.igniteSystem = async function() {
      const msg = document.getElementById('status-msg');
      const btn = document.getElementById('action-btn');
      
      btn.style.display = 'none';
      msg.innerHTML = "<span style='color:#00ffff; font-weight:bold; font-size: 1.4rem;'>ATTESA AUTORIZZAZIONE...</span><br><br>Consenti l'accesso dal popup del browser.";
      
      try {
        // Forza l'audio RAW disabilitando tutti i filtri di pulizia di Chrome/Safari
        const stream = await navigator.mediaDevices.getUserMedia({ 
          audio: { 
            echoCancellation: false, 
            noiseSuppression: false, 
            autoGainControl: false 
          }, 
          video: true 
        });
        
        msg.innerHTML = "<span style='color:#fff;'>Inizializzazione Motore Audio...</span>";
        await Tone.start();
        
        const audioContext = Tone.getContext().rawContext;
        const micSource = audioContext.createMediaStreamSource(stream);
        
        // --- 1. IL PRE-AMP (Boost +20dB) ---
        // Alza brutalmente il volume in ingresso per sconfiggere i blocchi hardware
        preAmp = new Tone.Volume(20);
        
        // --- 2. EFFETTI ---
        pitchShift = new Tone.PitchShift(0);
        pitchShift.windowSize = 0.05;

        flanger = new Tone.Chorus(4, 2.5, 0.5).start();
        flanger.wet.value = 0;

        feedbackDelay = new Tone.FeedbackDelay("16n", 0.95);
        feedbackDelay.wet.value = 0;

        masterVol = new Tone.Volume(-6); // Sicurezza uscita
        limiter = new Tone.Limiter(-1);
        meter = new Tone.Meter();

        // --- 3. ROUTING ---
        Tone.connect(micSource, preAmp);
        Tone.connect(preAmp, meter); // Il meter legge il segnale boostato
        
        preAmp.chain(pitchShift, flanger, feedbackDelay, masterVol, limiter, Tone.Destination);

        msg.innerHTML = "<span style='color:#ff2a5f;'>Caricamento Rete Neurale (AI)...</span>";

        video = createCapture(VIDEO, () => {
          facemesh = ml5.facemesh(video, () => {
            isRunning = true;
            document.getElementById('ui-container').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('panic').style.display = 'block';
          });
          facemesh.on("predict", results => { predictions = results; });
        });
        video.hide();

      } catch (e) {
        msg.innerHTML = "<span style='color:#ff2a5f; font-weight:bold;'>ERRORE SISTEMA:</span><br>" + e.message;
        btn.style.display = 'inline-block';
        btn.innerText = "RIPROVA";
      }
    };

    window.emergencyMute = function() {
      isMuted = !isMuted;
      Tone.Destination.mute = isMuted;
      const btn = document.getElementById('panic');
      if (isMuted) {
        btn.innerText = "AUDIO MUTATO (CLICCA PER SBLOCCARE)";
        btn.style.background = "#ff2a5f";
        btn.style.color = "#000";
      } else {
        btn.innerText = "EMERGENCY STOP (MUTE)";
        btn.style.background = "transparent";
        btn.style.color = "#ff2a5f";
      }
    }

    function draw() {
      let db = meter ? meter.getValue() : -100;
      let volNorm = map(db, -20, 10, 0, 1, true); // Adattato per il Pre-Amp
      background(volNorm * 40, 0, 10, 60);

      if (!isRunning) return;

      document.getElementById('val-db').innerText = isFinite(db) ? db.toFixed(1) : "-∞";

      push();
      translate(width, 0); scale(-1, 1);
      
      let shake = volNorm * 40; 
      translate(width/2 - video.width/2 + random(-shake, shake), height/2 - video.height/2 + random(-shake, shake));
      
      tint(255, 40 + (volNorm * 180));
      
      if (curFlanger > 0.5) tint(100, 200, 255, 180);
      else if (Math.abs(curPitch) > 5) tint(255, 42, 95, 180);
      
      image(video, 0, 0);

      if (predictions.length > 0) {
        processMocap();
        drawCyberMask(volNorm);
      }
      pop();

      if (volNorm > 0.8) {
        document.getElementById('warning').style.display = 'block';
        document.getElementById('hud').classList.add('glitch-active');
      } else {
        document.getElementById('warning').style.display = 'none';
        document.getElementById('hud').classList.remove('glitch-active');
      }
    }

    function drawCyberMask(volNorm) {
      const pts = predictions[0].scaledMesh;
      let explode = volNorm * 15;
      
      let r = 255;
      let g = map(curFlanger, 0, 1, 42, 255);
      let b = map(Math.abs(curPitch), 0, 24, 95, 255);

      stroke(r, g, b, 200);
      strokeWeight(2 + (volNorm * 4));
      noFill();
      beginShape(POINTS);
      for (let j = 0; j < pts.length; j++) {
        point(pts[j][0] + random(-explode, explode), pts[j][1] + random(-explode, explode));
      }
      endShape();
    }

    function processMocap() {
      const pts = predictions[0].scaledMesh;
      const nose = pts[1];
      const topLip = pts[13], bottomLip = pts[14];

      // BOCCA - DELAY FEEDBACK (Alta Sensibilità)
      // Si attiva da 5px di apertura e arriva al max a 25px
      let mouthDist = dist(topLip[0], topLip[1], bottomLip[0], bottomLip[1]);
      let targetDelay = mouthDist > 5 ? map(mouthDist, 5, 25, 0, 1, true) : 0;
      curDelay = lerp(curDelay, targetDelay, 0.15); // Leggermente più veloce a reagire
      feedbackDelay.wet.value = curDelay;

      // ASSE X - PITCH SHIFT
      let noseX = nose[0] - (video.width / 2);
      let targetPitch = Math.abs(noseX) > 30 ? map(noseX, -150, 150, -24, 24, true) * -1 : 0;
      curPitch = lerp(curPitch, targetPitch, 0.1);
      pitchShift.pitch = curPitch;

      // ASSE Y - CHORUS/FLANGER
      let noseY = nose[1] - (video.height / 2);
      let targetFlanger = Math.abs(noseY) > 30 ? map(Math.abs(noseY), 30, 150, 0, 1, true) : 0;
      curFlanger = lerp(curFlanger, targetFlanger, 0.1);
      flanger.wet.value = curFlanger;

      document.getElementById('val-delay').innerText = (curDelay * 100).toFixed(0);
      document.getElementById('val-pitch').innerText = curPitch.toFixed(1);
      document.getElementById('val-flanger').innerText = (curFlanger * 100).toFixed(0);
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
