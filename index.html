<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>VOID RIDER // STUDIO CALIBRATION</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.40/Tone.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    
    body { 
      margin: 0; padding: 0; background-color: #000; color: #0ff; 
      font-family: 'Share Tech Mono', monospace; overflow: hidden; 
    }

    #galaxy-bg {
      position: absolute; top: -10%; left: -10%; width: 120%; height: 120%; z-index: 1;
      background: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=2048&auto=format&fit=crop') center/cover no-repeat;
      opacity: 0.6; animation: galaxyDrift 60s infinite alternate linear; pointer-events: none;
    }
    @keyframes galaxyDrift {
      0% { transform: scale(1) rotate(0deg); }
      100% { transform: scale(1.1) rotate(2deg); }
    }

    #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; }

    #boot-screen {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0, 5, 15, 0.9); border: 2px solid #0ff; padding: 40px; 
      text-align: center; width: 600px; box-shadow: 0 0 50px rgba(0, 255, 255, 0.4);
      pointer-events: auto; border-radius: 5px;
    }
    h1 { margin: 0 0 20px 0; font-size: 2.5rem; letter-spacing: 5px; border-bottom: 2px solid #0ff; padding-bottom: 10px; }
    .btn { padding: 15px 40px; font-size: 1.2rem; background: rgba(0, 255, 255, 0.1); color: #0ff; border: 1px solid #0ff; cursor: pointer; font-weight: bold; transition: 0.3s; border-radius: 3px;}
    .btn:hover { background: #0ff; color: #000; box-shadow: 0 0 30px #0ff; }

    #panic {
      position: absolute; top: 30px; right: 30px; display: none; pointer-events: auto;
      background: rgba(255, 0, 50, 0.2); color: #ff0032; border: 2px solid #ff0032;
      padding: 15px 30px; cursor: pointer; font-weight: bold; font-size: 1.2rem; transition: 0.2s; border-radius: 3px;
    }

    #dashboard-controls {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: rgba(0, 10, 25, 0.9); border: 1px solid #0ff; padding: 15px 40px;
      display: none; align-items: center; gap: 20px; z-index: 2000; pointer-events: auto;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); border-radius: 5px; backdrop-filter: blur(5px);
    }
    .slider-container { display: flex; align-items: center; gap: 15px; font-size: 1.1rem; }
    input[type=range] { -webkit-appearance: none; width: 250px; background: transparent; }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; height: 20px; width: 10px; background: #0ff; cursor: pointer; box-shadow: 0 0 10px #0ff; margin-top: -8px;
    }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: rgba(0, 255, 255, 0.3); border-radius: 2px; }

    .hotspot {
      position: absolute; display: none; pointer-events: auto; cursor: pointer;
      background: rgba(0, 255, 255, 0.05); border: 1px dashed rgba(0, 255, 255, 0.3);
      justify-content: center; align-items: center; color: rgba(0,255,255,0.6); font-weight: bold; font-size: 1.2rem; transition: 0.3s;
    }
    .hotspot:hover { background: rgba(0, 255, 255, 0.2); text-shadow: 0 0 10px #0ff; border-style: solid; color: #0ff;}
    
    #hs-top { top: 20px; left: 20%; width: 60%; height: 60px; }
    #hs-bottom { bottom: 100px; left: 20%; width: 60%; height: 60px; } 
    #hs-left { top: 10%; left: 20px; width: 80px; height: 80%; }
    #hs-right { top: 10%; right: 20px; width: 80px; height: 80%; }

    #tutorial-modal {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0, 5, 10, 0.95); border: 2px solid #0ff; box-shadow: 0 0 50px #0ff;
      padding: 40px; display: none; width: 500px; text-align: center; pointer-events: auto; border-radius: 5px;
    }
  </style>
</head>
<body>

  <div id="galaxy-bg"></div>

  <div id="ui-layer">
    <div id="boot-screen">
      <h1>VOID RIDER // STUDIO</h1>
      <p>Centratura HUD bloccata. Audio calibrato per ascolto PC (70% Vol).</p>
      <button class="btn" id="action-btn">INIZIALIZZA SISTEMA</button>
    </div>

    <div id="dashboard-controls">
      <div class="slider-container">
        <span>GAIN MICROFONO:</span>
        <input type="range" id="mic-sens" min="0" max="24" value="6" step="1">
        <span id="sens-val" style="min-width: 50px;">+6dB</span>
      </div>
    </div>

    <div id="hs-top" class="hotspot" onclick="showTutorial('UP')">FLANGER</div>
    <div id="hs-bottom" class="hotspot" onclick="showTutorial('DOWN')">GLITCH</div>
    <div id="hs-left" class="hotspot" onclick="showTutorial('LEFT')">ALIEN</div>
    <div id="hs-right" class="hotspot" onclick="showTutorial('RIGHT')">PITCH UP</div>
    
    <button id="panic" onclick="window.emergencyMute()">⚠ TAGLIO MOTORI</button>

    <div id="tutorial-modal">
      <h2 id="tut-title" style="color:#0ff;">TITOLO</h2>
      <p id="tut-desc" style="color:#fff;">Descrizione...</p>
      <button class="btn" onclick="document.getElementById('tutorial-modal').style.display='none'">CHIUDI</button>
    </div>
  </div>

  <script>
    // --- VARIABILI GLOBALI ---
    let video, facemesh, predictions = [];
    let preAmp, noiseGate, eq, pitchShift, ringMod, chebyshev, flangerEffect, bitcrusher, glitchDistortion, spaceDelay, spaceReverb, meter, analyzer;
    let cPitch = 0, cRing = 0, cFlange = 0, cBit = 0, cSpace = 0;
    let isRunning = false, stars = [];
    let customHelmetImg; 

    // Punti della maschera per isolare il viso
    const silhouetteIndices = [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109];

    class Star {
      constructor() { this.x = random(-width, width); this.y = random(-height, height); this.z = random(width); this.pz = this.z; }
      update(speed) { this.z -= speed; if (this.z < 1) { this.z = width; this.x = random(-width, width); this.y = random(-height, height); this.pz = this.z; } }
      show() {
        let sx = map(this.x / this.z, 0, 1, 0, width); let sy = map(this.y / this.z, 0, 1, 0, height);
        let px = map(this.x / this.pz, 0, 1, 0, width); let py = map(this.y / this.pz, 0, 1, 0, height);
        this.pz = this.z;
        stroke(200, 255, 255, map(this.z, 0, width, 255, 0)); strokeWeight(map(this.z, 0, width, 3, 0));
        line(px, py, sx, sy); 
      }
    }

    function preload() {
      // INSERISCI QUI L'URL DEL TUO CASCHETTO (.PNG O .SVG)
      customHelmetImg = loadImage('data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'); 
    }

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight);
      canvas.position(0, 0); canvas.style('z-index', '10'); 
      for (let i = 0; i < 400; i++) stars.push(new Star()); 
    }

    document.getElementById('mic-sens').addEventListener('input', (e) => {
      let val = e.target.value;
      document.getElementById('sens-val').innerText = '+' + val + 'dB';
      if(preAmp) preAmp.volume.rampTo(parseFloat(val), 0.1);
    });

    document.getElementById('action-btn').addEventListener('click', async () => {
      document.getElementById('boot-screen').style.display = 'none';
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false }, video: true });
        await Tone.start();
        const mic = Tone.getContext().rawContext.createMediaStreamSource(stream);

        // ========================================================
        // AUDIO STABILE: Gate Primario -> PreAmp -> Effetti -> Master (-8dB)
        // ========================================================
        let initialGain = document.getElementById('mic-sens').value;
        
        // 1. Il Gate è il PRIMO scudo. Se non parli, il segnale muore qui. Nessun fischio.
        noiseGate = new Tone.Gate(-40, 0.1); 
        
        // 2. Il PreAmp amplifica SOLO il segnale pulito che ha superato il gate.
        preAmp = new Tone.Volume(parseFloat(initialGain)); 
        
        eq = new Tone.EQ3(0, 0, -5); 
        analyzer = new Tone.Waveform(256); 
        meter = new Tone.Meter();

        pitchShift = new Tone.PitchShift(0); pitchShift.windowSize = 0.05; pitchShift.wet.value = 0; 
        ringMod = new Tone.FrequencyShifter(50); ringMod.wet.value = 0; 
        chebyshev = new Tone.Chebyshev(100); chebyshev.wet.value = 0; 
        flangerEffect = new Tone.Chorus({ frequency: 0.15, delayTime: 1.5, depth: 1, feedback: 0.9 }).start(); flangerEffect.wet.value = 0; 
        bitcrusher = new Tone.BitCrusher(2); bitcrusher.wet.value = 0; 
        glitchDistortion = new Tone.Distortion(0.8); glitchDistortion.wet.value = 0;
        spaceDelay = new Tone.FeedbackDelay("8n", 0.6); spaceDelay.wet.value = 0;
        spaceReverb = new Tone.Freeverb({ roomSize: 0.9, dampening: 1500 }); spaceReverb.wet.value = 0;

        // 3. Output attenuato per sicurezza (-8dB) in modo da non innescare le casse
        let masterLimiter = new Tone.Limiter(-8);

        Tone.connect(mic, noiseGate); // Microfono -> Gate
        noiseGate.connect(preAmp);    // Gate -> PreAmp
        preAmp.chain(eq, analyzer, meter, pitchShift); // PreAmp -> Analisi -> Effetti
        pitchShift.chain(ringMod, bitcrusher, glitchDistortion, chebyshev, flangerEffect, spaceDelay, spaceReverb, masterLimiter, Tone.Destination);

        video = createCapture(VIDEO, () => {
          facemesh = ml5.facemesh(video, () => {
            isRunning = true;
            document.getElementById('panic').style.display = 'block';
            document.getElementById('dashboard-controls').style.display = 'flex';
            document.querySelectorAll('.hotspot').forEach(el => el.style.display = 'flex');
          });
          facemesh.on("predict", r => predictions = r);
        });
        video.hide();
      } catch (e) { alert("Errore: " + e.message); }
    });

    window.showTutorial = function(type) {
      const m = document.getElementById('tutorial-modal'); const t = document.getElementById('tut-title'); const d = document.getElementById('tut-desc');
      if(type==='LEFT'){ t.innerText="MODULATORE AD ANELLO"; d.innerText="Spostati a SINISTRA. Genera una frequenza aliena."; } 
      if(type==='RIGHT'){ t.innerText="PITCH UP"; d.innerText="Spostati a DESTRA. Alza la voce a livelli disumani."; } 
      if(type==='UP'){ t.innerText="FLANGER PROPULSORI"; d.innerText="Guarda in ALTO. Turbina Jet con feedback al limite."; } 
      if(type==='DOWN'){ t.innerText="BITCRUSHER GLITCH"; d.innerText="Guarda in BASSO. Annienta il segnale riducendolo a 2-bit."; }
      m.style.display = 'block';
    }

    function draw() {
      clear(); 
      if (!isRunning) return;

      let db = meter.getValue();
      let vol = map(db, -25, -2, 0, 1, true);

      if (predictions.length > 0) {
        let pts = predictions[0].scaledMesh;
        let nX = (pts[1][0] - video.width/2) / (video.width/2); 
        let nY = (pts[1][1] - video.height/2) / (video.height/2);

        let mDist = dist(pts[13][0], pts[13][1], pts[14][0], pts[14][1]);
        cSpace = lerp(cSpace, mDist > 8 ? map(mDist, 8, 25, 0, 1, true) : 0, 0.3);
        spaceDelay.wet.value = cSpace; spaceReverb.wet.value = cSpace;

        let tPitch = 0, tRing = 0;
        if (nX < -0.05) tPitch = map(nX, -0.05, -0.4, 0, 24, true); 
        else if (nX > 0.05) tRing = map(nX, 0.05, 0.4, 0, 1, true);
        
        cPitch = lerp(cPitch, tPitch, 0.3); pitchShift.pitch = cPitch; pitchShift.wet.value = cPitch > 1 ? 1 : 0;
        cRing = lerp(cRing, tRing, 0.3); ringMod.wet.value = cRing;

        let tFlange = 0, tBit = 0;
        if (nY < -0.05) tFlange = map(nY, -0.05, -0.4, 0, 1, true);
        else if (nY > 0.05) tBit = map(nY, 0.05, 0.4, 0, 1, true);
        
        cFlange = lerp(cFlange, tFlange, 0.3); chebyshev.wet.value = cFlange; flangerEffect.wet.value = cFlange;
        cBit = lerp(cBit, tBit, 0.3); bitcrusher.wet.value = cBit; glitchDistortion.wet.value = cBit; 
      }

      push(); translate(width / 2, height / 2);
      let warpSpeed = map(cFlange, 0, 1, 2, 80); 
      for (
