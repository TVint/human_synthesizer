<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>VOID RIDER - 02</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.40/Tone.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    body { margin: 0; padding: 0; background-color: #000; color: #0ff; font-family: 'Share Tech Mono', monospace; overflow: hidden; }
    
    #ui-container {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0, 5, 15, 0.95); border: 2px solid #0ff; padding: 40px; text-align: center; z-index: 9999;
      box-shadow: 0 0 50px rgba(0, 255, 255, 0.4); border-radius: 5px;
    }
    h1 { margin: 0 0 20px 0; font-size: 2.5rem; letter-spacing: 5px; border-bottom: 2px solid #0ff; padding-bottom: 10px; }
    .btn { padding: 15px 40px; font-size: 1.2rem; background: rgba(0, 255, 255, 0.1); color: #0ff; border: 1px solid #0ff; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: 0.3s; border-radius: 3px; }
    .btn:hover { background: #0ff; color: #000; box-shadow: 0 0 30px #0ff; }
    
    /* Pannello Controllo Utente (Sensibilità) */
    #dashboard-controls {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: rgba(0, 10, 25, 0.9); border: 1px solid #0ff; padding: 15px 40px;
      display: none; align-items: center; gap: 20px; z-index: 2000;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); border-radius: 5px; backdrop-filter: blur(5px);
    }
    .slider-container { display: flex; align-items: center; gap: 15px; font-size: 1.1rem; font-weight: bold;}
    input[type=range] { -webkit-appearance: none; width: 250px; background: transparent; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 10px; background: #0ff; cursor: pointer; box-shadow: 0 0 10px #0ff; margin-top: -8px; }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: rgba(0, 255, 255, 0.3); border-radius: 2px; }

    /* Taglio Motori */
    #panic {
      position: absolute; top: 30px; right: 30px; display: none; z-index: 8000;
      background: rgba(255, 0, 50, 0.2); color: #ff0032; border: 2px solid #ff0032;
      padding: 15px 30px; cursor: pointer; font-weight: bold; font-size: 1.2rem; transition: 0.2s; border-radius: 3px; letter-spacing: 2px;
    }
    #panic:hover { background: #ff0032; color: #000; box-shadow: 0 0 30px #ff0032; }

    .hotspot {
      position: absolute; z-index: 1000; display: none; cursor: pointer; transition: 0.3s;
      justify-content: center; align-items: center; text-align: center; color: rgba(0,255,255,0.4); font-size: 1.2rem; font-weight: bold; border: 1px dashed rgba(0,255,255,0.2);
    }
    .hotspot:hover { background: rgba(0, 255, 255, 0.2); border: 1px solid #0ff; color: #0ff; text-shadow: 0 0 10px #0ff; }
    #hs-top { top: 20px; left: 20%; width: 60%; height: 60px; }
    #hs-bottom { bottom: 110px; left: 20%; width: 60%; height: 60px; } /* Alzato per il pannello */
    #hs-left { top: 10%; left: 20px; width: 80px; height: 80%; }
    #hs-right { top: 10%; right: 20px; width: 80px; height: 80%; }

    #tutorial-modal {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0, 5, 10, 0.95); border: 2px solid #0ff; box-shadow: 0 0 50px #0ff; padding: 40px; z-index: 9000; display: none; width: 500px; text-align: center; border-radius: 5px;
    }
  </style>
</head>
<body>

  <div id="ui-container">
    <h1>VOID RIDER // TACTICAL</h1>
    <p>Integrità Strutturale Attiva. Protocollo Audio Sbloccato.</p>
    <button class="btn" id="action-btn">ESTABLISH LINK</button>
  </div>

  <div id="dashboard-controls">
    <div class="slider-container">
      <span>GAIN MICROFONO:</span>
      <input type="range" id="mic-sens" min="0" max="30" value="1" step="1">
      <span id="sens-val" style="min-width: 60px;">0dB</span>
    </div>
  </div>

  <button id="panic" onclick="window.emergencyMute()">⚠ TAGLIO MOTORI</button>

  <div id="hs-top" class="hotspot" onclick="showTutorial('UP')">[ FLANGER ]</div>
  <div id="hs-bottom" class="hotspot" onclick="showTutorial('DOWN')">[ CRUSH ]</div>
  <div id="hs-left" class="hotspot" onclick="showTutorial('LEFT')">[ ALIEN ]</div>
  <div id="hs-right" class="hotspot" onclick="showTutorial('RIGHT')">[ PITCH ]</div>

  <div id="tutorial-modal">
    <h2 id="tut-title" style="color:#0ff;">TITOLO</h2>
    <p id="tut-desc" style="color:#fff; font-size:1.2rem;">Descrizione...</p>
    <button class="btn" onclick="document.getElementById('tutorial-modal').style.display='none'">CHIUDI</button>
  </div>

  <script>
    let video, facemesh, predictions = [];
    let preAmp, noiseGate, eq, pitchShift, ringMod, flanger, bitcrusher, spaceDelay, spaceReverb, meter, analyzer;
    let cPitch = 0, cRing = 0, cFlange = 0, cBit = 0, cSpace = 0;
    let isRunning = false, stars = [];

    // Setup Stelle Iperspazio
    class Star {
      constructor() { this.x = random(-width, width); this.y = random(-height, height); this.z = random(width); this.pz = this.z; }
      update(speed) {
        this.z -= speed;
        if (this.z < 1) { this.z = width; this.x = random(-width, width); this.y = random(-height, height); this.pz = this.z; }
      }
      show() {
        let sx = map(this.x / this.z, 0, 1, 0, width); let sy = map(this.y / this.z, 0, 1, 0, height);
        let px = map(this.x / this.pz, 0, 1, 0, width); let py = map(this.y / this.pz, 0, 1, 0, height);
        this.pz = this.z;
        stroke(200, 255, 255, map(this.z, 0, width, 255, 0)); strokeWeight(map(this.z, 0, width, 3, 0));
        line(px, py, sx, sy);
      }
    }

    function setup() {
      createCanvas(windowWidth, windowHeight).position(0, 0).style('z-index', '-1');
      for (let i = 0; i < 600; i++) stars.push(new Star());
    }

    // Gestione Slider Sensibilità Utente
    document.getElementById('mic-sens').addEventListener('input', (e) => {
      let val = e.target.value;
      document.getElementById('sens-val').innerText = '+' + val + 'dB';
      if(preAmp) preAmp.volume.rampTo(parseFloat(val), 0.1);
    });

    document.getElementById('action-btn').addEventListener('click', async () => {
      document.getElementById('ui-container').style.display = 'none';
      const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false }, video: true });
      await Tone.start();
      const mic = Tone.getContext().rawContext.createMediaStreamSource(stream);

      // AUDIO ENGINE TATTICO
      let initialGain = document.getElementById('mic-sens').value;
      noiseGate = new Tone.Gate(-30, 0.1); // Taglia i rumori di fondo se non parli
      preAmp = new Tone.Volume(parseFloat(initialGain)); // L'utente amplifica a piacimento
      
      meter = new Tone.Meter();
      analyzer = new Tone.Waveform(256); // Per l'oscilloscopio
      
      pitchShift = new Tone.PitchShift(0); pitchShift.windowSize = 0.05; pitchShift.wet.value = 0;
      ringMod = new Tone.FrequencyShifter(50); ringMod.wet.value = 0; // Frequenza robotica aliena
      flanger = new Tone.Chorus({ frequency: 0.15, delayTime: 1.5, depth: 1, feedback: 0.95 }).start(); flanger.wet.value = 0; 
      bitcrusher = new Tone.BitCrusher(2); bitcrusher.wet.value = 0; // 2-bit destruction
      
      spaceDelay = new Tone.FeedbackDelay("8n", 0.6); spaceDelay.wet.value = 0;
      spaceReverb = new Tone.Freeverb({ roomSize: 0.9, dampening: 1000 }); spaceReverb.wet.value = 0;

      let masterLimiter = new Tone.Limiter(-5); // Limite di sicurezza per le casse

      Tone.connect(mic, noiseGate);
      noiseGate.connect(preAmp);
      preAmp.chain(analyzer, meter, pitchShift); // L'analisi avviene prima delle distorsioni spaziali
      pitchShift.chain(ringMod, bitcrusher, flanger, spaceDelay, spaceReverb, masterLimiter, Tone.Destination);

      video = createCapture(VIDEO, () => {
        facemesh = ml5.facemesh(video, () => {
          isRunning = true;
          document.getElementById('panic').style.display = 'block';
          document.getElementById('dashboard-controls').style.display = 'flex';
          document.querySelectorAll('.hotspot').forEach(el => el.style.display = 'flex');
        });
        facemesh.on("predict", r => predictions = r);
      });
      video.hide();
    });

    window.showTutorial = function(type) {
      const m = document.getElementById('tutorial-modal');
      const t = document.getElementById('tut-title'); const d = document.getElementById('tut-desc');
      if(type==='LEFT') { t.innerText="MODULATORE AD ANELLO"; d.innerText="Sposta la testa a SINISTRA. Crea un'onda aliena robotica."; }
      if(type==='RIGHT'){ t.innerText="PITCH UP"; d.innerText="Sposta la testa a DESTRA. Elimina la gravità vocale."; }
      if(type==='UP')   { t.innerText="WARP FLANGER"; d.innerText="Guarda in ALTO. Innesca il reattore al plasma (Larsen Warning)."; }
      if(type==='DOWN') { t.innerText="BITCRUSHER 2-BIT"; d.innerText="Guarda in BASSO. Frammentazione digitale critica del segnale."; }
      m.style.display = 'block';
    }

    function draw() {
      background(0, 3, 10);
      if (!isRunning) return;

      let db = meter.getValue();
      let vol = map(db, -25, -2, 0, 1, true);

      // MAPPING ESTREMO (Deadzone ridotta al 5%)
      if (predictions.length > 0) {
        let pts = predictions[0].scaledMesh;
        let nX = (pts[1][0] - video.width/2) / (video.width/2); 
        let nY = (pts[1][1] - video.height/2) / (video.height/2);

        // Bocca
        let mDist = dist(pts[13][0], pts[13][1], pts[14][0], pts[14][1]);
        cSpace = lerp(cSpace, mDist > 8 ? map(mDist, 8, 25, 0, 1, true) : 0, 0.2);
        spaceDelay.wet.value = cSpace; spaceReverb.wet.value = cSpace;

        // X (Pitch / Ring)
        let tPitch = 0, tRing = 0;
        if (nX < -0.05) tPitch = map(nX, -0.05, -0.4, 0, 24, true); 
        else if (nX > 0.05) tRing = map(nX, 0.05, 0.4, 0, 1, true); 
        
        cPitch = lerp(cPitch, tPitch, 0.2); pitchShift.pitch = cPitch; pitchShift.wet.value = cPitch > 1 ? 1 : 0;
        cRing = lerp(cRing, tRing, 0.2); ringMod.wet.value = cRing;

        // Y (Flange / Bit)
        let tFlange = 0, tBit = 0;
        if (nY < -0.05) tFlange = map(nY, -0.05, -0.4, 0, 1, true);
        else if (nY > 0.05) tBit = map(nY, 0.05, 0.4, 0, 1, true);
        
        cFlange = lerp(cFlange, tFlange, 0.2); flanger.wet.value = cFlange;
        cBit = lerp(cBit, tBit, 0.2); bitcrusher.wet.value = cBit;
      }

      // 1. SFONDO STELLE WARP
      push(); translate(width/2, height/2);
      let warpSpeed = map(cFlange, 0, 1, 1, 80); 
      for (let s of stars) { s.update(warpSpeed); s.show(); }
      pop();

      // Centro Schermo
      push();
      let shake = vol > 0.85 ? random(-15, 15) : 0;
      translate(width/2 + shake, height/2 + shake);

      // 2. CAVI NEURALI FLUIDI (Bézier Curves animate)
      drawFluidSynapses();

      // 3. OBLÒ CENTRALE E MASCHERA (Codice del tuo backup ottimizzato)
      stroke(0, 255, 255, 180); strokeWeight(4); fill(0, 5, 15, 150);
      ellipse(0, 0, 480, 480); 
      
      if (predictions.length > 0) {
        let pts = predictions[0].scaledMesh;
        drawingContext.save();
        beginShape();
        let faceW = dist(pts[234][0], pts[234][1], pts[454][0], pts[454][1]) * 1.6; 
        let faceH = dist(pts[10][0], pts[10][1], pts[152][0], pts[152][1]) * 1.6; 
        let faceCX = (pts[1][0] - video.width/2); 
        let faceCY = (pts[1][1] - video.height/2);
        
        ellipse(-faceCX, faceCY, faceW, faceH); 
        drawingContext.clip();

        push(); scale(-1, 1); 
        if(cBit > 0.2) { filter(POSTERIZE, 3); }
        
        // Offset glitch RGB
        let rO = map(cPitch, 0, 24, 0, 30);
        blendMode(SCREEN);
        tint(255, 0, 50, 200); image(video, -video.width/2 - rO, -video.height/2);
        tint(0, 255, 255, 200); image(video, -video.width/2 + rO, -video.height/2);
        tint(255, 255, 255, 255); image(video, -video.width/2, -video.height/2);
        blendMode(BLEND);
        pop();
        drawingContext.restore(); 

        // Ritorno dell'elmetto geometrico (predisposto per il design)
        drawHelmet(pts, faceCX, faceCY, faceW, faceH);
        
        // Reticolo Tattico Centrale
        stroke(0, 255, 255, 80); strokeWeight(1);
        line(-20, 0, 20, 0); line(0, -20, 0, 20);
        noFill(); ellipse(0, 0, 30, 30);
      }
      pop();

      // 4. INTERFACCIA HUD E TELEMETRIA
      drawTacticalHUD(db, vol);
    }

    // --- Cavi Fluidi ---
    function drawFluidSynapses() {
      let baseCol = color(0, 255, 255, 40);
      strokeWeight(4); noFill();
      
      function streamFluid(endX, endY, intensity, activeColor) {
        stroke(intensity > 0.1 ? activeColor : baseCol);
        
        // La magia: Onda sinusoidale per far fluttuare morbidamente i cavi
        let floatOffset = sin(frameCount * 0.05 + endX) * 30;
        let cX1 = endX * 0.3;
        let cY1 = endY * 0.8 + floatOffset; // Penzola verso il basso
        let cX2 = endX * 0.7;
        let cY2 = endY * 0.2 + floatOffset;
        
        bezier(0, 0, cX1, cY1, cX2, cY2, endX, endY);
        
        // I pacchetti di dati scorrono lungo la curva
        if (intensity > 0.1) {
          let t = (frameCount * 0.03 * (1 + intensity*2)) % 1; 
          let px = bezierPoint(0, cX1, cX2, endX, t); 
          let py = bezierPoint(0, cY1, cY2, endY, t);
          noStroke(); fill(activeColor); ellipse(px, py, 15 + intensity*10, 15 + intensity*10); 
          fill(255); ellipse(px, py, 6, 6); noFill();
        }
      }

      streamFluid(0, -height/2, cFlange, color(255, 200, 0));
      streamFluid(0, height/2, cBit, color(0, 255, 50));
      streamFluid(-width/2, 0, cRing, color(255, 0, 255));
      streamFluid(width/2, 0, cPitch/24, color(0, 150, 255));
    }

    function drawHelmet(pts, cx, cy, w, h) {
      push();
      translate(-cx, cy); 
      stroke(0, 255, 255, 150); noFill();
      strokeWeight(3);
      arc(0, -h/4, w*0.9, h*0.5, PI, 0); 
      line(-w*0.45, -h/4, -w*0.4, h/4); 
      line(w*0.45, -h/4, w*0.4, h/4);
      strokeWeight(1);
      for(let i=-20; i<=20; i+=10) { line(i, h/3, i, h/2); }
      if (cSpace > 0.1) {
        noStroke(); fill(0, 255, 255, cSpace * 100); ellipse(0, h/4, 80 * cSpace, 80 * cSpace);
      }
      pop();
    }

    // --- Cockpit HUD Avanzato ---
    function drawTacticalHUD(db, vol) {
      let isCritical = vol > 0.85;
      let c = isCritical ? color(255, 0, 50) : color(0, 255, 255);
      
      // Flash Rosso Larsen
      if (isCritical) { fill(255, 0, 50, random(30, 80)); noStroke(); rect(0, 0, width, height); }

      // 1. Olografia Oscilloscopio (In alto)
      let wave = analyzer.getValue();
      push(); translate(width/2, 100); stroke(c); strokeWeight(2); noFill();
      beginShape(); for (let i = 0; i < wave.length; i++) { vertex(map(i, 0, wave.length, -250, 250), wave[i] * 60); } endShape();
      fill(0, 255, 255, 10); noStroke(); ellipse(0, 0, 500, 40); pop();

      // 2. VU-Meter Integrità
      let rX = width/2 - 250, rY = height - 130; 
      fill(10, 20, 30, 200); stroke(c); strokeWeight(2); rect(rX, rY, 500, 15);
      noStroke(); fill(c); rect(rX, rY, map(vol, 0, 1, 0, 500, true), 15);
      
      textAlign(CENTER); textSize(16); textStyle(BOLD);
      fill(isCritical && frameCount % 10 < 5 ? 255 : c);
      text(isCritical ? "⚠ INTEgrità CRITICA // OVERLOAD ⚠" : "SISTEMA AUDIO PRIMARIO", width/2, rY - 10);

      // 3. Telemetria Laterale
      textAlign(LEFT); fill(c); textSize(14); textStyle(NORMAL);
      let lX = 50, lY = height/2 - 60;
      text(`> GRAVITÀ_X: +${cPitch.toFixed(1)} ST`, lX, lY);
      text(`> ALIEN_MOD: ${(cRing*100).toFixed(0)}%`, lX, lY + 25);
      text(`> JET_FLANGE: ${(cFlange*100).toFixed(0)}%`, lX, lY + 50);
      text(`> CRUSH_DATA: ${(cBit*100).toFixed(0)}%`, lX, lY + 75);

      textAlign(RIGHT); fill(0, 255, 255, 150); textSize(12);
      text(`SYS.MEM: [0x8A7B2]\nROUTE: [UNDEFINED]\nMIC.PEAK: [${db.toFixed(1)} dB]\nLINK: [STABLE]`, width - 50, height/2);

      // 4. Cornici Angolari
      stroke(c); noFill(); strokeWeight(3);
      line(30, 80, 30, 30); line(30, 30, 80, 30); 
      line(width-80, 30, width-30, 30); line(width-30, 30, width-30, 80); 
      line(30, height-80, 30, height-30); line(30, height-30, 80, height-30); 
      line(width-80, height-30, width-30, height-30); line(width-30, height-30, width-30, height-80); 
    }

    // Emergenza
    window.emergencyMute = () => { 
      Tone.Destination.mute = !Tone.Destination.mute; 
      let btn = document.getElementById('panic');
      btn.innerText = Tone.Destination.mute ? "⚠ SBLOCCA MOTORI" : "⚠ TAGLIO MOTORI"; 
      if(Tone.Destination.mute) btn.style.background = "#ff0032"; else btn.style.background = "rgba(255, 0, 50, 0.2)";
    };

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
