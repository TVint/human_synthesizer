<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>VOID RIDER // TACTICAL HUD FINAL</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.40/Tone.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    body { 
      margin: 0; padding: 0; background-color: #020205; color: #00ffff; 
      font-family: 'Share Tech Mono', monospace; overflow: hidden; 
    }
    
    #ui-container {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(2, 5, 15, 0.95); border: 1px solid #00ffff; 
      padding: 40px; text-align: center; z-index: 200; width: 500px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.2);
      clip-path: polygon(0 20px, 20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
    }
    
    h1 { margin: 0 0 20px 0; font-size: 2.2rem; letter-spacing: 4px; border-bottom: 1px solid #00ffff; padding-bottom: 10px; }
    #status-msg { margin-bottom: 25px; color: #88ccaa; font-size: 0.9rem; line-height: 1.6; }
    
    .btn {
      display: inline-block; padding: 15px 40px; margin-top: 15px; font-size: 1.2rem;
      background: rgba(0, 255, 255, 0.1); color: #00ffff; border: 1px solid #00ffff;
      cursor: pointer; text-transform: uppercase; font-weight: bold; 
      border-radius: 3px; letter-spacing: 2px; transition: all 0.3s;
      position: relative; z-index: 1000;
    }
    .btn:hover { background: #00ffff; color: #000; box-shadow: 0 0 15px #00ffff; }

    #panic {
      position: absolute; top: 20px; right: 20px; z-index: 300; display: none;
      background: rgba(255, 0, 50, 0.2); color: #ff0032; border: 1px solid #ff0032;
      padding: 10px 20px; cursor: pointer; text-transform: uppercase; font-size: 0.8rem;
    }
    #panic:hover { background: #ff0032; color: #000; box-shadow: 0 0 15px #ff0032;}
  </style>
</head>
<body>

  <div id="ui-container">
    <h1>VOID RIDER // LINK.START()</h1>
    <div id="status-msg">
      <b>SISTEMA HUD NEURALE V2.1 // MASTER CALIBRATION</b><br><br>
      > Sensibilità Y: AUMENTATA (Jet Response)<br>
      > Idle Noise Gate: ATTIVO (Zero Artefatti)<br>
      > Space Engine: PRONTO (Labbra = Trigger)<br>
      <span style="color:#ff0033">> WARNING: Feedback quantico monitorato.</span>
    </div>
    <button class="btn" id="action-btn">ESTABLISH NEURAL LINK</button>
  </div>

  <button id="panic" onclick="window.emergencyMute()">TAGLIO MOTORI</button>

  <script>
    let video, facemesh, predictions = [];
    let pitchShift, chebyshev, flangerEffect, spaceDelay, spaceReverb, limiter, meter;
    
    let curPitch = 0, curPitchWet = 0;
    let curSpace = 0, curFlanger = 0;
    let headX = 0, headY = 0;
    let isRunning = false;

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight);
      canvas.position(0, 0);
      canvas.style('z-index', '-1'); 
      canvas.style('pointer-events', 'none'); 
    }

    document.getElementById('action-btn').addEventListener('click', async () => {
      document.getElementById('action-btn').style.display = 'none';
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          audio: { echoCancellation: false, noiseSuppression: false }, video: true 
        });
        
        await Tone.start();
        const micSource = Tone.getContext().rawContext.createMediaStreamSource(stream);

        // --- MOTORE AUDIO CALIBRATO ---
        pitchShift = new Tone.PitchShift(0);
        pitchShift.windowSize = 0.05; // Finestra più ampia per voce meno robotica a riposo
        pitchShift.wet.value = 0; // START DRY (Evita il phasing)

        chebyshev = new Tone.Chebyshev(50);
        chebyshev.wet.value = 0; // START DRY (Evita il fruscio)

        flangerEffect = new Tone.Chorus({
          frequency: 15, delayTime: 3.5, depth: 0.9, feedback: 0.95, spread: 180
        }).start();
        flangerEffect.wet.value = 0;

        spaceDelay = new Tone.FeedbackDelay("16n", 0.7);
        spaceDelay.wet.value = 0;
        
        spaceReverb = new Tone.Freeverb({ roomSize: 0.85, dampening: 1500 });
        spaceReverb.wet.value = 0;

        limiter = new Tone.Limiter(-1);
        meter = new Tone.Meter();

        Tone.connect(micSource, pitchShift);
        Tone.connect(micSource, meter);
        // Catena: Pitch -> Chebyshev -> Flanger -> Delay -> Reverb -> Out
        pitchShift.chain(chebyshev, flangerEffect, spaceDelay, spaceReverb, limiter, Tone.Destination);

        video = createCapture(VIDEO, () => {
          facemesh = ml5.facemesh(video, () => {
            isRunning = true;
            document.getElementById('ui-container').style.display = 'none';
            document.getElementById('panic').style.display = 'block';
          });
          facemesh.on("predict", r => predictions = r);
        });
        video.hide();
      } catch (e) { alert("Errore inizializzazione: " + e.message); }
    });

    function draw() {
      background(3, 5, 10);
      if (!isRunning) return;

      let db = meter.getValue();
      let vol = map(db, -40, 0, 0, 1, true);

      // --- LOGICA MAPPING BIOMETRICA (SMART CALIBRATION) ---
      if (predictions.length > 0) {
        let pts = predictions[0].scaledMesh;
        let nose = pts[1];
        let topL = pts[13], botL = pts[14];

        // 1. BOCCA (Sensibilità ottimizzata, Deadzone=10)
        let mDist = dist(topL[0], topL[1], botL[0], botL[1]);
        let targetSpace = mDist > 10 ? map(mDist, 10, 35, 0, 1, true) : 0;
        curSpace = lerp(curSpace, targetSpace, 0.15); // Reattività fluida
        spaceDelay.wet.value = curSpace;
        spaceReverb.wet.value = curSpace;

        // 2. TESTA X (Pitch Shift con Wet/Dry Dinamico)
        headX = (video.width/2) - nose[0]; 
        let tPitch = 0;
        let tPitchWet = 0;
        // Deadzone di 25px per evitare tremolii
        if (Math.abs(headX) > 25) {
          tPitch = map(headX, -150, 150, -24, 24, true);
          tPitchWet = map(Math.abs(headX), 25, 60, 0, 1, true); // Accende l'effetto dolcemente
        }
        curPitch = lerp(curPitch, tPitch, 0.15);
        curPitchWet = lerp(curPitchWet, tPitchWet, 0.15);
        
        pitchShift.pitch = curPitch;
        pitchShift.wet.value = curPitchWet;

        // 3. TESTA Y (Jet Flanger Iper-Sensibile)
        headY = (video.height/2) - nose[1];
        // Abbassata la deadzone a 15, raggiunge il 100% già a 90px (molto più sensibile)
        let tFlange = headY > 15 ? map(headY, 15, 90, 0, 1, true) : 0;
        curFlanger = lerp(curFlanger, tFlange, 0.2); // Reazione rapida (0.2)
        
        // Spegne i motori a riposo
        chebyshev.wet.value = curFlanger;
        flangerEffect.wet.value = curFlanger;
      }

      // --- RENDER HUD TATTICO ---
      drawBackgroundGrid();
      
      push();
      translate(width, 0); scale(-1, 1);
      
      let shake = vol > 0.85 ? random(-25, 25) : 0;
      translate(width/2 - video.width/2 + shake, height/2 - video.height/2 + shake);
      
      let offset = map(Math.abs(curPitch), 0, 24, 0, 40);
      blendMode(SCREEN);
      tint(255, 0, 50, 140); image(video, -offset, 0);
      tint(0, 255, 255, 140); image(video, offset, 0);
      tint(255, 255, 255, 180); image(video, 0, 0);
      blendMode(BLEND);

      if (predictions.length > 0) drawFaceOverlay(vol);
      pop();

      drawTacticalUI(db, vol);
    }

    function drawBackgroundGrid() {
      stroke(0, 255, 255, 15);
      strokeWeight(1);
      for(let x=0; x<width; x+=50) line(x, 0, x, height);
      for(let y=0; y<height; y+=50) line(0, y, width, y);
    }

    function drawFaceOverlay(vol) {
      let pts = predictions[0].scaledMesh;
      stroke(0, 255, 255, 100);
      noFill();
      beginShape(LINES);
      for(let i=0; i<pts.length; i+=10) vertex(pts[i][0], pts[i][1]);
      endShape();
      
      let nose = pts[1];
      stroke(255); strokeWeight(1.5);
      ellipse(nose[0], nose[1], 40 + vol*50);
      line(nose[0]-30, nose[1], nose[0]+30, nose[1]);
      line(nose[0], nose[1]-30, nose[0], nose[1]+30);
    }

    function drawTacticalUI(db, vol) {
      let c = vol > 0.85 ? color(255, 0, 50) : color(0, 255, 255);
      stroke(c); fill(c);
      
      // VU-METER
      let rX = width/2 - 200, rY = height - 80;
      fill(10, 20, 40, 220); stroke(c); rect(rX, rY, 400, 25, 3);
      let w = map(db, -40, 0, 0, 400, true);
      noStroke(); fill(c); rect(rX, rY, w, 25, 3);
      
      // Redout Strobo
      if (vol > 0.85) {
        fill(255, 0, 50, random(50, 150)); rect(0, 0, width, height);
      }

      textAlign(CENTER); textSize(16);
      if (vol > 0.85 && frameCount % 6 < 3) {
        fill(255); text("⚠ LARSEN EFFECT ALERT // INTEGRITY CRITICAL ⚠", width/2, rY-15);
      } else {
        fill(c); text("NEURAL LINK TELEMETRY // AUDIO CORE MONITOR", width/2, rY-15);
      }

      // DATI TATTICI
      textAlign(LEFT); fill(0, 255, 255, 180); textSize(14);
      let xR=width-200, yR=100;
      text(`> GRAVITY_X: ${curPitch.toFixed(1)} ST`, xR, yR);
      text(`> JET_PROP: ${(curFlanger*100).toFixed(0)}%`, xR, yR+20);
      text(`> VOID_Z: ${(curSpace*100).toFixed(0)}%`, xR, yR+40);
      text(`> SYS.TEMP: ${map(db, -40, 0, 100, 950).toFixed(0)} K`, xR, yR+60);

      textAlign(RIGHT); fill(0, 255, 255, 80); textSize(11);
      text(`SEC_TRACTOR_BEAM_STAT: [${db.toFixed(1)}db]\n`+
           `ASTRO_NAV_LINK: [ACTIVE]\n`+
           `HULL_PLATING_LOAD: [${(vol*100).toFixed(1)}%]\n`+
           `SYS.ERROR_LOG: [CLEAR]\n`, width-20, height-150);

      stroke(0, 255, 255, 60); noFill(); strokeWeight(1);
      drawHUDCorner(20, 20, 60, true);
      drawHUDCorner(width-20, 20, 60, false);

      let spX=30, spY=height-130, spW=200, spH=80;
      rect(spX, spY, spW, spH);
      for(let i=0; i<spW; i+=10) {
        fill(0, 255, 255, random(30, 80)); noStroke();
        rect(spX+i, spY+spH, 8, -random(20, spH));
      }

      push(); translate(100, 100);
      stroke(0, 255, 255, 80); ellipse(0, 0, 100, 100);
      fill(0, 255, 255, 30); ellipse(0, 0, 50, 50);
      line(-60, 0, 60, 0); line(0, -60, 0, 60);
      let rx = map(headX, -150, 150, -45, 45, true);
      let ry = map(headY, -150, 150, 45, -45, true);
      fill(0, 255, 255); noStroke(); ellipse(rx, ry, 6, 6);
      pop();
    }

    function drawHUDCorner(x, y, size, left) {
      if(left) {
        line(x, y, x+size, y); line(x, y, x, y+size);
        line(x, y+size+5, x, y+size+size/2); 
      } else {
        line(x, y, x-size, y); line(x, y, x, y+size);
        line(x, y+size+5, x, y+size+size/2); 
      }
    }

    window.emergencyMute = () => { Tone.Destination.mute = !Tone.Destination.mute; document.getElementById('panic').innerText = Tone.Destination.mute ? "SBLOCCA MOTORI" : "TAGLIO MOTORI"; };
    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
