<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>GLITCH // FEEDBACK LOOP v2</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  
  <style>
    body { margin: 0; padding: 0; background-color: #000; color: #ff0033; font-family: 'Courier New', monospace; overflow: hidden; }
    
    #ui-container {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(10, 0, 0, 0.95); border: 2px solid #ff0033; padding: 40px; text-align: center;
      z-index: 200; box-shadow: 0 0 50px rgba(255, 0, 51, 0.6); width: 450px;
    }
    
    h1 { margin-top: 0; font-size: 2rem; letter-spacing: 5px; color: #ff0033; }
    #status-msg { margin: 20px 0; color: #00ffff; font-size: 0.9rem; min-height: 40px; }
    
    .btn {
      display: inline-block; padding: 15px 30px; margin-top: 10px; font-size: 1.2rem;
      background: #ff0033; color: #000; border: none; cursor: pointer; 
      text-transform: uppercase; font-weight: bold;
    }
    .btn:hover { background: #fff; }

    #hud {
      position: absolute; top: 20px; left: 20px; z-index: 100; display: none;
      background: rgba(0, 0, 0, 0.85); padding: 20px; border-left: 5px solid #ff0033;
    }
    .hud-row { margin-bottom: 5px; font-size: 1rem; }
    .hud-val { color: #fff; }
    
    #panic {
      position: absolute; bottom: 20px; right: 20px; z-index: 300; display: none;
      background: #ff0033; color: #fff; border: 1px solid #fff; padding: 10px 20px; cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="ui-container">
    <h1 id="title">SYS.INIT</h1>
    <div id="status-msg">Benvenuto nel Portale. <br> Clicca per iniziare la sequenza di accesso.</div>
    <button class="btn" id="action-btn" onclick="window.nextStep()">INIZIA SEQUENZA</button>
  </div>

  <div id="hud">
    <div class="hud-row">MIC LEVEL: <span id="val-db" class="hud-val">-∞</span> dB</div>
    <div class="hud-row">PITCH (X): <span id="val-pitch" class="hud-val">0</span> semi</div>
    <div class="hud-row">CHORUS (Y): <span id="val-chorus" class="hud-val">0</span>%</div>
    <div class="hud-row">DELAY (Z): <span id="val-delay" class="hud-val">0</span>%</div>
    <div style="color:#0ff; font-size: 0.7rem; margin-top:10px;">VOLUME SET: 50% (SAFETY MODE)</div>
  </div>

  <button id="panic" onclick="window.emergencyMute()">STOP AUDIO</button>

  <script>
    let video, facemesh, predictions = [];
    let mic, pitchShift, chorus, feedbackDelay, limiter, meter;
    let curPitch = 0, curDelay = 0, curChorus = 0;
    let isRunning = false, step = 0;

    // --- SEQUENZA DI ACCESSO PERSONALIZZATA ---
    window.nextStep = async function() {
      const msg = document.getElementById('status-msg');
      const btn = document.getElementById('action-btn');
      const title = document.getElementById('title');

      if (step === 0) {
        title.innerText = "AUDIO.CHECK";
        msg.innerHTML = "ATTENZIONE: Il volume del sistema verrà limitato al 50% per la tua sicurezza acustica.<br>Acconsenti all'uso del microfono.";
        btn.innerText = "ATTIVA MICROFONO";
        step++;
      } 
      else if (step === 1) {
        try {
          await Tone.start();
          mic = new Tone.UserMedia();
          
          // Setup Catena Audio con Effetti Richiesti
          pitchShift = new Tone.PitchShift(0);
          pitchShift.windowSize = 0.03; // Più reattivo

          chorus = new Tone.Chorus(4, 2.5, 0.5).start(); // Chorus per asse Y
          chorus.wet.value = 0;

          feedbackDelay = new Tone.FeedbackDelay("16n", 0.8);
          feedbackDelay.wet.value = 0;

          // Limiter impostato per simulare un volume al 50% (circa -6dB di output)
          limiter = new Tone.Limiter(-6); 
          meter = new Tone.Meter();

          mic.chain(pitchShift, chorus, feedbackDelay, limiter, Tone.Destination);
          mic.connect(meter);

          await mic.open();
          
          title.innerText = "VISION.CHECK";
          msg.innerHTML = "Microfono calibrato al 50%.<br>Ora è necessaria la scansione biometrica della videocamera.";
          btn.innerText = "ATTIVA VIDEOCAMERA";
          step++;
        } catch (e) {
          msg.innerHTML = "<span style='color:red'>ERRORE: Accesso negato al microfono.</span>";
        }
      } 
      else if (step === 2) {
        btn.style.display = 'none';
        msg.innerHTML = "Sincronizzazione FaceMesh in corso...";
        
        video = createCapture(VIDEO, () => {
          facemesh = ml5.facemesh(video, () => {
            isRunning = true;
            document.getElementById('ui-container').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('panic').style.display = 'block';
          });
          facemesh.on("predict", results => { predictions = results; });
        });
        video.hide();
      }
    };

    window.emergencyMute = function() {
      Tone.Destination.mute = !Tone.Destination.mute;
      document.getElementById('panic').innerText = Tone.Destination.mute ? "ATTIVA AUDIO" : "STOP AUDIO";
    };

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight);
      canvas.position(0, 0);
      canvas.style('z-index', '-1');
    }

    function draw() {
      let db = meter ? meter.getValue() : -100;
      let volNorm = map(db, -50, -5, 0, 1, true);
      
      background(volNorm * 30, 0, 10, 80);

      if (!isRunning) return;

      document.getElementById('val-db').innerText = isFinite(db) ? db.toFixed(1) : "-∞";

      push();
      translate(width, 0); scale(-1, 1);
      
      // Terremoto basato sui bassi/volume
      let shake = volNorm * 40;
      translate(width/2 - video.width/2 + random(-shake, shake), height/2 - video.height/2 + random(-shake, shake));
      
      tint(255, 50 + (volNorm * 200));
      image(video, 0, 0);

      if (predictions.length > 0) {
        handleInteraction();
        renderMask(volNorm);
      }
      pop();
    }

    function handleInteraction() {
      const pts = predictions[0].scaledMesh;
      const nose = pts[1];

      // 1. ASSE X -> PITCH SHIFT (Aumentato l'effetto come richiesto)
      // Mappatura estrema: +/- 24 semitoni (2 ottave)
      let noseX = nose[0] - (video.width / 2);
      let targetPitch = map(noseX, -150, 150, -24, 24, true) * -1;
      curPitch = lerp(curPitch, targetPitch, 0.1);
      pitchShift.pitch = curPitch;

      // 2. ASSE Y -> CHORUS (Su e Giù)
      let noseY = nose[1] - (video.height / 2);
      // Più ti allontani dal centro verticale, più il chorus è "wet"
      let targetChorus = map(Math.abs(noseY), 20, 150, 0, 1, true);
      curChorus = lerp(curChorus, targetChorus, 0.1);
      chorus.wet.value = curChorus;

      // 3. BOCCA -> DELAY (Il feedback loop)
      const topLip = pts[13], bottomLip = pts[14];
      let mouthDist = dist(topLip[0], topLip[1], bottomLip[0], bottomLip[1]);
      let targetDelay = mouthDist > 12 ? map(mouthDist, 12, 60, 0, 0.9, true) : 0;
      curDelay = lerp(curDelay, targetDelay, 0.1);
      feedbackDelay.wet.rampTo(curDelay, 0.1);

      // Aggiorna HUD
      document.getElementById('val-pitch').innerText = curPitch.toFixed(1);
      document.getElementById('val-chorus').innerText = (curChorus * 100).toFixed(0);
      document.getElementById('val-delay').innerText = (curDelay * 100).toFixed(0);
    }

    function renderMask(volNorm) {
      const pts = predictions[0].scaledMesh;
      stroke(255, 0, 51, 150);
      strokeWeight(1 + volNorm * 4);
      noFill();
      beginShape(POINTS);
      for (let i = 0; i < pts.length; i++) {
        point(pts[i][0], pts[i][1]);
      }
      endShape();
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
